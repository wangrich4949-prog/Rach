<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rach的宝盒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: #0c0c16;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden; user-select: none; -webkit-user-select: none;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }

  /* ===== 颜色变量 ===== */
  :root {
    --g0: #0c0c16; --g1: #181828; --g2: #242438; --g3: #303048;
    --g4: #3c3c58; --g5: #484868; --g6: #585878; --g7: #707090; --gl: #8888a8;
    --b0: #0d0812; --b1: #1c142a; --b2: #2c2040; --b3: #3c2c50; --b4: #4c3860;
    --sky: #0a0a1a; --ui: #f0e4c8; --ui2: #e0d4b8; --uid: #3c2c50;
    --gold: #d8a030; --gold2: #f0c840; --pink: #c84050; --pink2: #e06070;
    --px: 4px;
  }

  /* ===== 场景容器 ===== */
  .nature-scene { position:fixed; inset:0; pointer-events:none; z-index:0; }

  /* ===== 像素树冠天花板 ===== */
  .px-canopy { position:fixed; pointer-events:none; z-index:4; }
  .px-canopy::after {
    content:''; display:block; width:4px; height:4px;
    box-shadow: var(--cs);
  }
  @keyframes canopyBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }

  /* ===== 像素树干 ===== */
  .px-tree { position:fixed; bottom:0; z-index:1; transform-origin:bottom center; }
  .px-tree .trunk {
    margin:0 auto;
    background: var(--tb, #2c2040);
    image-rendering: pixelated;
  }
  .px-tree .trunk::after {
    content:''; display:block; width:4px; height:4px; position:relative;
    top:var(--ctop, -20px); left:50%; transform:translateX(-50%);
    box-shadow: var(--cshadow);
  }
  @keyframes pxSway {
    0%,100% { transform:skewX(-0.4deg); }
    25%     { transform:skewX(0.3deg); }
    50%     { transform:skewX(0.6deg); }
    75%     { transform:skewX(0.2deg); }
  }

  /* ===== 像素草地 ===== */
  .px-grass-cont { position:fixed; bottom:0; left:0; right:0; height:30px; z-index:3; pointer-events:none; }
  .px-grass-cont::after {
    content:''; display:block; width:4px; height:4px;
    box-shadow: var(--gs);
  }
  @keyframes pxGrass {
    0%,100% { transform:skewX(-1deg); }
    50%     { transform:skewX(1.5deg); }
  }

  /* ===== 像素落叶 ===== */
  .px-leaf {
    position:fixed; pointer-events:none; z-index:2;
    width:6px; height:6px;
    background: var(--lc, #e09820);
    image-rendering: pixelated;
    opacity:0;
    animation: pxLeafFall var(--fdur, 8s) steps(8) infinite;
    animation-delay: var(--fdelay, 0s);
  }
  @keyframes pxLeafFall {
    0%   { transform:translateY(-6vh) translateX(0) rotate(0deg); opacity:0; }
    5%   { opacity:0.9; }
    40%  { transform:translateY(45vh) translateX(var(--ldx, 30px)) rotate(120deg); opacity:0.8; }
    75%  { transform:translateY(78vh) translateX(calc(var(--ldx, 30px) * -0.5)) rotate(250deg); opacity:0.4; }
    95%  { opacity:0.1; }
    100% { transform:translateY(105vh) translateX(var(--ldx, 30px)) rotate(360deg); opacity:0; }
  }

  /* ===== 像素花瓣 ===== */
  .px-petal {
    position:fixed; pointer-events:none; z-index:2;
    width:5px; height:5px;
    background: var(--pc, #f0c040);
    image-rendering: pixelated;
    opacity:0;
    animation: pxPetalDrift var(--pdur, 12s) steps(10) infinite;
    animation-delay: var(--pdelay, 0s);
  }
  @keyframes pxPetalDrift {
    0%   { transform:translate(0, -5vh) rotate(0deg); opacity:0; }
    8%   { opacity:0.8; }
    50%  { transform:translate(var(--pdx, 50px), 55vh) rotate(180deg); opacity:0.6; }
    85%  { opacity:0.25; }
    100% { transform:translate(calc(var(--pdx, 50px) * 1.5), 108vh) rotate(340deg); opacity:0; }
  }

  /* ===== 像素花朵 ===== */
  .px-flower {
    position:fixed; bottom:var(--fy, 12px); z-index:3; pointer-events:none;
    width:4px; height:4px;
    box-shadow: var(--fs);
    animation: pxFlower var(--fdur, 3s) steps(4) infinite;
    animation-delay: var(--fdelay, 0s);
  }
  @keyframes pxFlower {
    0%,100%{transform:rotate(-3deg)}
    50%{transform:rotate(3deg)}
  }

  /* ===== 像素灌木 ===== */
  .px-bush {
    position:fixed; pointer-events:none; z-index:3;
  }
  .px-bush::after {
    content:''; display:block; width:4px; height:4px;
    box-shadow: var(--bs);
  }
  @keyframes pxBushBob {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-2px)}
  }

  /* ===== 像素藤曼 ===== */
  .px-vine {
    position:fixed; pointer-events:none; z-index:3;
    width:2px;
    background: linear-gradient(180deg, #5c3818 0%, #3a6a20 60%, #58b838 100%);
    image-rendering: pixelated;
    animation: pxVineSway var(--vdur, 5s) steps(4) infinite;
    animation-delay: var(--vdelay, 0s);
    transform-origin: top center;
  }
  .px-vine::after {
    content:''; display:block; width:4px; height:4px; position:absolute;
    bottom:0; left:-1px;
    box-shadow: var(--vleaf);
  }
  @keyframes pxVineSway {
    0%,100%{transform:rotate(-1deg)}
    50%{transform:rotate(1.5deg)}
  }

  /* ===== 像素花茎（更高花朵） ===== */
  .px-tall-flower {
    position:fixed; pointer-events:none; z-index:3;
    bottom: var(--tfy, 8px);
    animation: pxFlower var(--tfdur, 3s) steps(4) infinite;
    animation-delay: var(--tfdelay, 0s);
    transform-origin: bottom center;
  }
  .px-tall-flower::before {
    content:''; display:block; width:3px; height:var(--stem, 24px);
    background: #4a8a20;
    margin:0 auto;
    image-rendering: pixelated;
  }
  .px-tall-flower::after {
    content:''; display:block; width:4px; height:4px;
    box-shadow: var(--tfs);
  }

  /* ===== 页面容器 ===== */
  .page { position:relative; z-index:10; width:100%; display:flex; flex-direction:column; align-items:center; }
  .page.hidden { display:none; }
  .container { width:100%; max-width:390px; padding:20px 14px; display:flex; flex-direction:column; align-items:center; gap:16px; }

  /* ===== 像素卡片 ===== */
  .px-card {
    position:relative; width:100%; display:flex; flex-direction:column; align-items:center;
    gap:12px; padding:24px 16px 20px;
    background: var(--ui);
    border: none;
    border-radius: 0;
    box-shadow:
      0 0 0 3px var(--uid),
      0 0 0 6px var(--b3),
      0 0 0 9px var(--uid),
      6px 6px 0 0 rgba(0,0,0,0.25);
    image-rendering: pixelated;
  }

  /* ===== 标题 ===== */
  .px-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: #1a3a10;
    text-align: center; line-height: 1.8; letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }

  /* ===== 像素分割线 ===== */
  .px-divider {
    width: 80%; height: 4px;
    background: var(--g3);
    box-shadow: 0 4px 0 var(--g1), 0 8px 0 var(--g2);
    image-rendering: pixelated;
  }

  /* ===== 按钮组 ===== */
  .btn-group { display:flex; flex-direction:column; gap:14px; width:100%; padding:0 4px; }

  .px-btn {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:100%; padding:16px 0;
    font-family:'Press Start 2P', monospace; font-size:11px;
    color: #3a2010;
    background: var(--ui2);
    border: none; border-radius: 0;
    cursor: pointer; letter-spacing: 1px; outline: none;
    box-shadow:
      0 0 0 2px var(--uid),
      0 0 0 4px var(--b3),
      0 6px 0 0 var(--b2),
      0 6px 0 2px var(--uid);
    transition: transform .05s, box-shadow .05s;
    image-rendering: pixelated;
  }
  .px-btn:active {
    transform: translateY(4px);
    box-shadow:
      0 0 0 2px var(--uid),
      0 0 0 4px var(--b3),
      0 2px 0 0 var(--b2),
      0 2px 0 2px var(--uid);
  }

  /* 皇帝按钮 - 金色像素 */
  .px-btn-emperor {
    background: #f8e898;
    color: #3a2010;
    box-shadow:
      0 0 0 2px #8a6010,
      0 0 0 4px var(--gold),
      0 6px 0 0 #8a6010,
      0 6px 0 2px #8a6010;
  }
  .px-btn-emperor:active {
    box-shadow:
      0 0 0 2px #8a6010,
      0 0 0 4px var(--gold),
      0 2px 0 0 #8a6010,
      0 2px 0 2px #8a6010;
  }

  /* ===== 底部信息 ===== */
  .px-footer {
    margin-top:4px; font-family:'Press Start 2P', monospace;
    font-size:9px; color: var(--g5); text-align:center; letter-spacing:1px;
    animation: pxBlink 2.5s steps(1) infinite;
  }
  @keyframes pxBlink { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* ===== 波纹 ===== */
  .ripple {
    position:fixed; width:16px; height:16px;
    background: rgba(104,200,72,0.4); pointer-events:none; z-index:99;
    animation: rippleOut .4s steps(6) forwards;
    image-rendering: pixelated;
  }
  @keyframes rippleOut {
    0%{transform:scale(0.5);opacity:.8}
    100%{transform:scale(4);opacity:0}
  }

  /* ============================================ */
  /*  输入分数页面                                 */
  /* ============================================ */

  .px-input-title {
    font-family:'Press Start 2P', monospace; font-size:12px;
    color: #1a3a10; text-align:center; letter-spacing:1px;
  }
  .px-input-hint {
    font-size:9px; color: var(--b3); text-align:center; letter-spacing:1px;
    font-family:'Press Start 2P', monospace;
  }

  /* 分数显示框 */
  .px-input-box {
    width:100%;
    background: var(--ui);
    border: none;
    padding:14px;
    box-shadow:
      0 0 0 3px var(--uid),
      0 0 0 6px var(--b3),
      0 0 0 9px var(--uid);
    image-rendering: pixelated;
  }
  .px-input-display {
    font-family:'Press Start 2P', monospace; font-size:32px;
    color: #1a0c04;
    background: var(--ui2);
    border: none;
    box-shadow:
      inset 0 0 0 2px var(--b2),
      inset 0 0 0 4px var(--ui);
    padding:16px; text-align:center;
    margin-bottom:14px; letter-spacing:3px;
    image-rendering: pixelated;
  }

  /* 数字键盘 */
  .px-numpad { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }

  .px-key {
    font-family:'Press Start 2P', monospace; font-size:16px;
    color: #3a2010;
    background: var(--ui2);
    border: none;
    padding:14px 0; cursor:pointer; text-align:center;
    box-shadow:
      0 0 0 2px var(--uid),
      0 4px 0 0 var(--b2),
      0 4px 0 2px var(--uid);
    transition:transform .04s, box-shadow .04s; outline:none;
    image-rendering: pixelated;
  }
  .px-key:active {
    transform:translateY(3px);
    box-shadow: 0 0 0 2px var(--uid), 0 1px 0 0 var(--b2), 0 1px 0 2px var(--uid);
  }
  .px-key-del {
    font-size:10px; background: #f8a0a0; color: #600;
    box-shadow: 0 0 0 2px #600, 0 4px 0 0 #600, 0 4px 0 2px #600;
  }
  .px-key-go {
    font-size:12px;
    background: var(--g5); color: #fff;
    box-shadow:
      0 0 0 2px #1a3a10,
      0 4px 0 0 #1a3a10,
      0 4px 0 2px #1a3a10,
      0 0 12px rgba(72,168,40,0.4);
  }

  /* 输入页底部按钮 */
  .px-input-bottom { display:flex; gap:10px; width:100%; }
  .px-input-bottom .px-btn { flex:1; font-size:10px; padding:12px 0; }
  .px-back-btn { font-size:10px !important; padding:12px 0 !important; background: #c8b898 !important; }

  /* ============================================ */
  /*  像素展示台                                   */
  /* ============================================ */

  .px-slot-title {
    font-family:'Press Start 2P', monospace; font-size:12px;
    color: #1a3a10; text-align:center; letter-spacing:1px;
  }

  /* 花冠 */
  .px-crown {
    display:flex; justify-content:center; align-items:flex-end;
    gap:4px; height:36px; margin-bottom:-4px; position:relative; z-index:2;
  }
  .px-crown-flower {
    width:16px; height:20px; background:#f08090;
    box-shadow: -4px -4px 0 #f8b0c0, 4px -4px 0 #f8b0c0, 0 -8px 0 #f8a0b0;
    image-rendering: pixelated;
  }
  .px-crown-flower.center {
    width:24px; height:28px; background: var(--gold);
    box-shadow: -4px -4px 0 var(--gold2), 4px -4px 0 var(--gold2), 0 -8px 0 var(--gold2), -8px 0 0 var(--gold2), 8px 0 0 var(--gold2);
  }

  /* 展示头部 */
  .px-display-head {
    width:84%; margin:0 auto;
    background: var(--b2);
    box-shadow: 0 0 0 3px var(--b1), 0 0 0 6px var(--b0);
    padding:12px 10px 8px;
    text-align:center; position:relative; z-index:1;
    image-rendering: pixelated;
  }

  /* 花苞灯 */
  .px-lights { display:flex; justify-content:center; gap:6px; margin-top:4px; }
  .px-light {
    width:10px; height:10px;
    background: var(--b0);
    transition:background .2s, box-shadow .2s, transform .2s;
    image-rendering: pixelated;
  }
  .px-light.lit {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(232,192,64,0.5);
    transform:scale(1.4);
  }
  .px-lights.chasing .px-light {
    animation: pxChase .6s steps(1) infinite;
  }
  .px-lights.chasing .px-light:nth-child(1){animation-delay:0s}
  .px-lights.chasing .px-light:nth-child(2){animation-delay:.07s}
  .px-lights.chasing .px-light:nth-child(3){animation-delay:.14s}
  .px-lights.chasing .px-light:nth-child(4){animation-delay:.21s}
  .px-lights.chasing .px-light:nth-child(5){animation-delay:.28s}
  .px-lights.chasing .px-light:nth-child(6){animation-delay:.35s}
  .px-lights.chasing .px-light:nth-child(7){animation-delay:.42s}
  @keyframes pxChase {
    0%,12%  { background:var(--gold); box-shadow:0 0 10px var(--gold); transform:scale(1.4); }
    13%,100%{ background:var(--b0); box-shadow:none; transform:scale(1); }
  }

  /* 展示机身 */
  .px-display-body {
    width:80%; margin:0 auto;
    background: var(--b3);
    padding:10px 8px 6px; position:relative;
    image-rendering: pixelated;
  }

  /* 屏幕框 */
  .px-bezel {
    padding:6px;
    background: var(--b1);
    box-shadow: inset 0 0 0 2px var(--b0);
    image-rendering: pixelated;
  }
  .px-screen {
    background: var(--ui);
    box-shadow: inset 0 0 0 2px var(--b2), inset 0 0 0 4px var(--ui);
    padding:8px 6px 4px;
    image-rendering: pixelated;
  }

  /* 滚轴 */
  .px-reels { display:flex; justify-content:center; gap:8px; padding:4px 0; position:relative; z-index:1; }

  .reel-frame {
    position:relative; width:66px; height:48px;
    background: var(--b0);
    box-shadow: 0 0 0 2px var(--b2), inset 0 0 8px rgba(0,0,0,0.4);
    overflow:hidden;
    image-rendering: pixelated;
  }
  .reel-frame::before {
    content:''; position:absolute; top:0;left:0;right:0;height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
    z-index:3; pointer-events:none;
  }
  .reel-frame::after {
    content:''; position:absolute; left:0;right:0; top:50%;
    height:2px; background:var(--gold);
    box-shadow:0 0 6px var(--gold);
    z-index:3; pointer-events:none;
  }

  .reel-strip { position:absolute; left:0; width:100%; will-change:transform; }
  .reel-num {
    display:flex; align-items:center; justify-content:center;
    height:44px;
    font-family:'Press Start 2P', monospace; font-size:26px;
    color: #f0e0c0;
    text-shadow:2px 2px 0 rgba(0,0,0,0.5);
  }

  /* 屏幕底部 */
  .px-display-label {
    text-align:center; font-family:'Press Start 2P', monospace;
    font-size:8px; color: var(--ui); letter-spacing:4px;
    padding:4px 0 2px; opacity:.7;
  }

  /* 装饰搁板 */
  .px-shelf {
    width:88%; margin:0 auto;
    background: var(--b3);
    box-shadow: 0 0 0 2px var(--b1), 0 0 0 5px var(--b0), 0 4px 0 0 var(--b2);
    padding:8px 12px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    image-rendering: pixelated;
  }
  .px-shelf-moss { flex:1; height:6px; background: var(--g4); }
  .px-shelf-gem {
    width:10px; height:10px; background: var(--gold);
    box-shadow: 0 0 8px var(--gold); flex-shrink:0;
  }
  .px-shelf-gem.sm { width:8px; height:8px; background: var(--pink); box-shadow: 0 0 6px var(--pink); }

  /* 底座 */
  .px-base {
    width:80%; margin:0 auto;
    background: var(--b2);
    box-shadow: 0 0 0 2px var(--b1), 0 0 0 5px var(--b0);
    padding:6px 8px 8px;
    image-rendering: pixelated;
  }
  .px-base-line { height:3px; margin:4px 0; background: var(--b3); }
  .px-foot {
    width:88%; height:10px; margin:0 auto -4px;
    background: var(--b1);
    box-shadow: 0 0 0 2px var(--b0), 0 3px 8px rgba(0,0,0,0.3);
    image-rendering: pixelated;
  }

  /* 滚轴动画 */
  .reel-frame.spinning {
    animation: pxSpinGlow .3s steps(1) infinite;
  }
  @keyframes pxSpinGlow {
    0%,100%{ box-shadow:0 0 0 2px var(--b2), inset 0 0 8px rgba(0,0,0,0.4); }
    50%{ box-shadow:0 0 0 2px var(--gold), 0 0 14px var(--gold), inset 0 0 8px rgba(0,0,0,0.4); }
  }
  .reel-frame.landed {
    animation: pxLandFlash .4s steps(5) forwards;
  }
  @keyframes pxLandFlash {
    0%{ box-shadow:0 0 0 2px var(--gold), 0 0 20px var(--gold); transform:scale(1.08); }
    100%{ box-shadow:0 0 0 2px var(--b2), inset 0 0 8px rgba(0,0,0,0.4); transform:scale(1); }
  }

  /* 像素爆发 */
  .px-burst {
    position:fixed; pointer-events:none; z-index:100;
    width:6px; height:6px;
    background:var(--bc, #68c848);
    animation: pxBurstOut var(--bdur, .6s) steps(8) forwards;
    image-rendering: pixelated;
  }
  @keyframes pxBurstOut {
    0%   { transform:translate(0,0) scale(.5); opacity:1; }
    100% { transform:translate(var(--bx),var(--by)) scale(.1); opacity:0; }
  }

  /* 底部按钮 */
  .px-slot-bottom { display:flex; gap:10px; width:100%; margin-top:10px; }
  .px-slot-bottom .px-btn { flex:1; font-size:10px; padding:12px 0; }
  .px-retry-btn {
    font-size:10px !important; padding:12px 0 !important;
    background: var(--g4) !important; color: #fff !important;
    box-shadow: 0 0 0 2px #1a3a10, 0 0 0 4px var(--g3), 0 6px 0 0 #1a3a10, 0 6px 0 2px #1a3a10 !important;
  }

  /* ============================================ */
  /*  小皇帝和情绪                                 */
  /* ============================================ */

  .px-emo-scroll {
    width:100%; display:flex; flex-direction:column; gap:5px;
    padding:2px 0;
  }

  .px-emo-card {
    background: var(--ui);
    padding:6px 12px 4px;
    box-shadow: 0 0 0 2px var(--uid);
    image-rendering: pixelated;
    transition: box-shadow .2s;
  }
  .px-emo-card.flash {
    box-shadow: 0 0 0 2px var(--uid), 0 0 14px var(--dg, rgba(72,168,40,0.3));
  }

  .px-emo-name {
    font-family:'Press Start 2P', monospace; font-size:9px;
    color: #1a3a10; letter-spacing:1px; text-align:center;
  }

  .px-emo-slider-wrap { position:relative; padding:3px 0 2px; }

  .px-emo-ticks {
    display:flex; justify-content:space-between;
    padding:0 8px; margin-bottom:-2px;
    position:relative; z-index:2; pointer-events:none;
  }
  .px-emo-tick {
    width:6px; height:6px;
    background: #c0c8b8;
    transition:background .15s, box-shadow .15s, transform .15s;
    image-rendering: pixelated;
  }
  .px-emo-tick.near {
    background: var(--tc); transform:scale(1.5);
    box-shadow: 0 0 4px var(--tg);
  }

  .emo-slider {
    -webkit-appearance:none; appearance:none;
    width:100%; height:20px; background:transparent;
    cursor:pointer; outline:none; margin:0;
    position:relative; z-index:3;
  }
  .emo-slider::-webkit-slider-runnable-track {
    width:100%; height:4px;
    background:linear-gradient(90deg,
      var(--tc) 0%, var(--tc) var(--fill,50%),
      #d0d8c8 var(--fill,50%), #d0d8c8 100%
    );
  }
  .emo-slider::-moz-range-track {
    width:100%; height:4px;
    background:linear-gradient(90deg,
      var(--tc) 0%, var(--tc) var(--fill,50%),
      #d0d8c8 var(--fill,50%), #d0d8c8 100%
    );
  }
  .emo-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:16px; height:16px; margin-top:-6px;
    background:var(--tc);
    box-shadow: 0 0 0 2px var(--ui), 0 0 0 5px var(--tg);
    cursor:pointer; transition:transform .1s;
    image-rendering: pixelated;
  }
  .emo-slider::-webkit-slider-thumb:active { transform:scale(1.2); }
  .emo-slider::-moz-range-thumb {
    width:16px; height:16px;
    background:var(--tc);
    box-shadow: 0 0 0 2px var(--ui), 0 0 0 5px var(--tg);
    cursor:pointer; image-rendering: pixelated;
  }

  .px-emo-labels {
    display:flex; justify-content:space-between;
    padding:0 4px; margin-top:2px;
  }
  .px-emo-label {
    font-family:'Press Start 2P', monospace; font-size:6px;
    color: #7a8a70; letter-spacing:.5px;
    line-height:1.4; max-width:40%;
  }
  .px-emo-label:first-child { text-align:left; }
  .px-emo-label:last-child  { text-align:right; }

  .emo-pop {
    position:fixed; pointer-events:none; z-index:100;
    width:6px; height:6px;
    background:var(--ep, #5CAA3E);
    animation: emoPop .4s steps(6) forwards;
    image-rendering: pixelated;
  }
  @keyframes emoPop {
    0%{transform:translate(0,0) scale(.4);opacity:1;}
    100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0;}
  }

  /* 情绪页紧凑覆盖 */

</style>

<script>
  // ========== 像素叶子簇生成函数 ==========
  const GREENS = ['#1a3a10','#2d5a1c','#3d7a24','#48a828','#58b838','#68c848','#3a6020','#509030'];
  const DARK_GREENS = ['#0c1a08','#163010','#1e3814','#2a4a18'];

  function pxLeafCluster(w, h, density, colors) {
    const shadows = [];
    const count = Math.floor(w * h * density / 16);
    const rx = w / 2, ry = h / 2;
    for (let i = 0; i < count; i++) {
      let px, py;
      do {
        px = (Math.random() - 0.5) * w;
        py = (Math.random() - 0.5) * h;
      } while ((px * px) / (rx * rx) + (py * py) / (ry * ry) > 1);
      const sx = Math.round(px / 4) * 4;
      const sy = Math.round(py / 4) * 4;
      const c = colors[Math.floor(Math.random() * colors.length)];
      shadows.push(`${sx}px ${sy}px 0 0 ${c}`);
    }
    return shadows.join(',');
  }

  function pxTreeCanopy(w, h) {
    return pxLeafCluster(w, h, 1.8, GREENS);
  }

  // ===== 生成像素森林场景 =====
  (function() {
    const scene = document.getElementById('nature-scene');
    let html = '';

    // ---- 像素树冠天花板 ----
    // 多层重叠的像素叶子簇
    const canopyLayers = [
      // 顶部溢出层 (伸出页面顶端)
      [2, -10, 160, 100, 2.3, GREENS, 4, true],
      [28, -6, 150, 95, 2.1, GREENS, 4, true],
      [50, -8, 170, 105, 2.4, GREENS, 4, true],
      [72, -4, 155, 98, 2.2, GREENS, 4, true],
      [95, -10, 140, 90, 2.0, GREENS, 4, true],
      // 上层 — 天蓬主体
      [10, 8, 130, 80, 1.8, GREENS, 4, false],
      [35, 5, 145, 85, 1.9, GREENS, 4, false],
      [60, 12, 135, 78, 1.7, GREENS, 4, false],
      [85, 6, 140, 82, 1.8, GREENS, 4, false],
      // 中层 — 向下延伸
      [5, 28, 120, 75, 1.6, GREENS, 4, false],
      [30, 24, 130, 80, 1.7, GREENS, 4, false],
      [55, 30, 125, 72, 1.5, GREENS, 4, false],
      [80, 26, 135, 78, 1.6, GREENS, 4, false],
      // 中下层
      [8, 44, 110, 65, 1.4, DARK_GREENS, 3, false],
      [33, 40, 120, 70, 1.5, DARK_GREENS, 3, false],
      [58, 46, 105, 62, 1.3, DARK_GREENS, 3, false],
      [83, 42, 115, 68, 1.4, DARK_GREENS, 3, false],
      // 底层 — 贴近树干顶部
      [15, 58, 90, 55, 1.2, DARK_GREENS, 3, false],
      [45, 54, 100, 60, 1.3, DARK_GREENS, 3, false],
      [70, 60, 95, 52, 1.2, DARK_GREENS, 3, false],
      [90, 56, 105, 58, 1.3, DARK_GREENS, 3, false],
    ];

    canopyLayers.forEach(([cx, cy, cw, ch, density, colors, z, anim]) => {
      const cs = pxLeafCluster(cw, ch, density, colors);
      const animStyle = anim ? 'animation:canopyBob ' + (5 + Math.random() * 5) + 's steps(4) infinite;' : '';
      html += `<div class="px-canopy" style="left:${cx}%;top:${cy}%;width:${cw}px;height:${ch}px;z-index:${z};--cs:${cs};${animStyle}animation-delay:${Math.random()*4}s;"></div>`;
    });

    // ---- 像素星星/光点 ----
    for (let i = 0; i < 18; i++) {
      const sx = Math.random() * 96;
      const sy = Math.random() * 60;
      const ss = 2 + Math.random() * 3;
      html += `<div style="position:fixed;left:${sx}%;top:${sy}%;width:${ss}px;height:${ss}px;background:#fff;z-index:0;image-rendering:pixelated;animation:pxBlink ${3+Math.random()*5}s steps(1) infinite;animation-delay:${Math.random()*3}s;"></div>`;
    }

    // ---- 背景树 (8棵, 远处) ----
    for (let i = 0; i < 8; i++) {
      const x = 3 + Math.random() * 94;
      const h = 55 + Math.random() * 35;
      const w = 8 + Math.floor(Math.random() * 6);
      const tb = ['#1a2a10','#1e3012','#16280c'][Math.floor(Math.random()*3)];
      const cw = 40 + Math.random() * 50;
      const ch = 30 + Math.random() * 35;
      const ctop = -(ch * 0.6);
      const cs = pxTreeCanopy(cw, ch);
      html += `<div class="px-tree" style="left:${x}%;z-index:0;opacity:0.55;animation:pxSway ${7+Math.random()*5}s steps(6) infinite;animation-delay:${Math.random()*5}s;">
        <div class="trunk" style="width:${w}px;height:${h}vh;--tb:${tb};--ctop:${ctop}px;--cshadow:${cs};"></div>
      </div>`;
    }

    // ---- 中层树 (7棵) ----
    for (let i = 0; i < 7; i++) {
      const x = 5 + Math.random() * 90;
      const h = 65 + Math.random() * 30;
      const w = 10 + Math.floor(Math.random() * 8);
      const cw = 55 + Math.random() * 60;
      const ch = 35 + Math.random() * 45;
      const ctop = -(ch * 0.55);
      const cs = pxTreeCanopy(cw, ch);
      html += `<div class="px-tree" style="left:${x}%;z-index:1;opacity:0.75;animation:pxSway ${5+Math.random()*4}s steps(6) infinite;animation-delay:${Math.random()*4}s;">
        <div class="trunk" style="width:${w}px;height:${h}vh;--tb:#3a2010;--ctop:${ctop}px;--cshadow:${cs};"></div>
      </div>`;
    }

    // ---- 前景树 (5棵, 粗壮) ----
    const fgTrees = [
      { x: 3, h: 88, w: 20 },
      { x: 14, h: 85, w: 16 },
      { x: 25, h: 90, w: 18 },
      { x: 78, h: 87, w: 17 },
      { x: 92, h: 89, w: 22 },
    ];
    fgTrees.forEach(t => {
      const cw = 70 + Math.random() * 50;
      const ch = 45 + Math.random() * 40;
      const ctop = -(ch * 0.5);
      const cs = pxTreeCanopy(cw, ch);
      html += `<div class="px-tree" style="left:${t.x}%;z-index:2;animation:pxSway ${4+Math.random()*3}s steps(6) infinite;animation-delay:${Math.random()*3}s;">
        <div class="trunk" style="width:${t.w}px;height:${t.h}vh;--tb:#5c3818;--ctop:${ctop}px;--cshadow:${cs};"></div>
      </div>`;
    });

    // ---- 藤曼 (从前景树冠垂下) ----
    const vineLeafColors = ['#58b838','#68c848','#48a828','#3d7a24','#88d858'];
    fgTrees.forEach(t => {
      const numVines = 2 + Math.floor(Math.random() * 4);
      for (let v = 0; v < numVines; v++) {
        const vx = t.x + (Math.random() - 0.5) * 8;
        const vy = (100 - t.h) - Math.random() * 3; // 树冠底部%
        const vh = 30 + Math.random() * 55; // 藤曼长度 vh
        const vdur = 4 + Math.random() * 5;
        const vdelay = Math.random() * 4;
        // 藤曼末端像素叶子
        const vLeafShadows = [];
        for (let l = 0; l < 6; l++) {
          const lx = (Math.random() - 0.5) * 12;
          const ly = (Math.random() - 0.5) * 8;
          const vlc = vineLeafColors[Math.floor(Math.random() * vineLeafColors.length)];
          vLeafShadows.push(`${Math.round(lx/4)*4}px ${Math.round(ly/4)*4}px 0 0 ${vlc}`);
        }
        html += `<div class="px-vine" style="left:${vx}%;top:${vy}vh;height:${vh}px;--vdur:${vdur}s;--vdelay:${vdelay}s;--vleaf:${vLeafShadows.join(',')};"></div>`;
      }
    });

    // ---- 像素草地 (使用box-shadow批量生成) ----
    const grassShadows = [];
    for (let i = 0; i < 80; i++) {
      const gx = Math.random() * 100;
      const gy = -(4 + Math.floor(Math.random() * 24));
      const gc = GREENS[Math.floor(Math.random() * GREENS.length)];
      grassShadows.push(`${gx}vw ${gy}px 0 ${gc}`);
    }
    html += `<div class="px-grass-cont" style="--gs:${grassShadows.join(',')};animation:pxGrass ${3+Math.random()*3}s steps(5) infinite;"></div>`;

        // ---- 像素灌木丛 (结构化穹顶形状) ----
    function pxBushShape(w, h) {
      const shadows = [];
      const dark  = ['#1a3a10','#2a4a18','#1e3812'];
      const mid   = ['#2d5a1c','#3a6020','#3d7a24'];
      const light = ['#48a828','#58b838','#509030'];
      const hl    = ['#68c848','#78d858','#88e060'];
      const rows = Math.floor(h / 4);
      for (let row = 0; row < rows; row++) {
        const y = -(row * 4);
        const prog = row / Math.max(rows - 1, 1);
        const curveFactor = 1 - Math.pow(prog, 1.6);
        const rowHalfW = Math.floor(w * curveFactor / 2);
        const startX = -Math.floor(rowHalfW / 4) * 4;
        for (let x = startX; x <= rowHalfW; x += 4) {
          const edgeRatio = Math.abs(x) / Math.max(rowHalfW, 1);
          if (edgeRatio > 0.7 && Math.random() < edgeRatio * 0.55) continue;
          let palette;
          if (prog < 0.25) palette = dark;
          else if (prog < 0.55) palette = mid;
          else if (prog < 0.82) palette = light;
          else palette = hl;
          const c = palette[Math.floor(Math.random() * palette.length)];
          shadows.push(x + 'px ' + y + 'px 0 0 ' + c);
        }
      }
      for (let i = 0; i < Math.floor(w / 5); i++) {
        const hx = Math.round((Math.random() - 0.5) * w * 0.5 / 4) * 4;
        const hy = -(rows * 4) + Math.floor(Math.random() * 3) * 4;
        shadows.push(hx + 'px ' + hy + 'px 0 0 ' + hl[Math.floor(Math.random()*hl.length)]);
      }
      return shadows.join(',');
    }

    const bushDefs = [
      { x:3,  b:2, w:72, h:40 },
      { x:11, b:1, w:56, h:32 },
      { x:22, b:2, w:64, h:36 },
      { x:33, b:1, w:80, h:44 },
      { x:47, b:2, w:88, h:48 },
      { x:58, b:1, w:60, h:34 },
      { x:70, b:2, w:76, h:40 },
      { x:80, b:1, w:52, h:30 },
      { x:90, b:2, w:68, h:38 },
      { x:96, b:1, w:48, h:28 },
    ];

    bushDefs.forEach(bp => {
      const bs = pxBushShape(bp.w, bp.h);
      html += '<div class="px-bush" style="left:' + bp.x + '%;bottom:' + bp.b + 'vh;--bs:' + bs + ';animation:pxBushBob ' + (4+Math.random()*4).toFixed(1) + 's steps(5) infinite;animation-delay:' + (Math.random()*3).toFixed(1) + 's;"></div>';
    });

    // ---- 像素高花 (有茎) ----
    const tallFlowerColors = ['#fff8e0','#f8e8a0','#f8a0b0','#f8c860','#f8d8e0','#f0f0c0','#ffe8d0','#f8d0e8'];
    for (let i = 0; i < 18; i++) {
      const tfx = 2 + Math.random() * 96;
      const tfy = 8 + Math.random() * 32;
      const stem = 16 + Math.floor(Math.random() * 30);
      const tfc = tallFlowerColors[Math.floor(Math.random() * tallFlowerColors.length)];
      const tfs = [
        `-4px -4px 0 ${tfc}`, `4px -4px 0 ${tfc}`,
        `-4px 4px 0 ${tfc}`, `4px 4px 0 ${tfc}`,
        `0 -8px 0 ${tfc}`, `-8px 0 0 ${tfc}`,
        `8px 0 0 ${tfc}`, `0 0 0 #68c848`
      ].join(',');
      html += `<div class="px-tall-flower" style="left:${tfx}%;--tfy:${tfy}px;--stem:${stem}px;--tfs:${tfs};--tfdur:${3+Math.random()*3}s;--tfdelay:${Math.random()*3}s;"></div>`;
    }

    // ---- 像素花朵 (矮花, 前景) ----
    const flowerColors = ['#fff8e0','#f8e8a0','#f8a0b0','#f8c860','#f8d8e0','#f0f0c0'];
    for (let i = 0; i < 10; i++) {
      const fx = 3 + Math.random() * 94;
      const fy = 4 + Math.random() * 14;
      const fc = flowerColors[Math.floor(Math.random() * flowerColors.length)];
      const fs = [
        `-4px -4px 0 ${fc}`, `4px -4px 0 ${fc}`,
        `-4px 4px 0 ${fc}`, `4px 4px 0 ${fc}`,
        `0 -8px 0 ${fc}`, `0 0 0 #68c848`
      ].join(',');
      html += `<div class="px-flower" style="left:${fx}%;--fy:${fy}px;--fs:${fs};--fdur:${3+Math.random()*3}s;--fdelay:${Math.random()*3}s;"></div>`;
    }

    // ---- 像素落叶 ----
    const leafColors = ['#58b838','#68c848','#88d858','#48a828','#f8a0b0','#f8c860','#88d060'];
    for (let i = 0; i < 25; i++) {
      const lx = Math.random() * 96;
      const ldur = 6 + Math.random() * 10;
      const ldelay = Math.random() * 12;
      const ldx = -50 + Math.random() * 100;
      const lc = leafColors[Math.floor(Math.random() * leafColors.length)];
      html += `<div class="px-leaf" style="left:${lx}%;--lc:${lc};--fdur:${ldur}s;--fdelay:${ldelay}s;--ldx:${ldx}px;"></div>`;
    }

    // ---- 像素花瓣 ----
    const petalColors = ['#f8a0b0','#f8b8c8','#f8c860','#f8e8c0','#f89098'];
    for (let i = 0; i < 10; i++) {
      const px = Math.random() * 94;
      const pdur = 10 + Math.random() * 12;
      const pdelay = Math.random() * 14;
      const pdx = 30 + Math.random() * 80;
      const pc = petalColors[Math.floor(Math.random() * petalColors.length)];
      html += `<div class="px-petal" style="left:${px}%;--pc:${pc};--pdur:${pdur}s;--pdelay:${pdelay}s;--pdx:${pdx}px;"></div>`;
    }

    scene.innerHTML = html;
  })();

  // ===== 页面导航 =====
  const pageHome  = document.getElementById('page-home');
  const pageInput = document.getElementById('page-input');
  const pageSlot  = document.getElementById('page-slot');
  const pageEmotion = document.getElementById('page-emotion');
  let currentScore = 0;

  function hideAll() {
    pageHome.classList.add('hidden');
    pageInput.classList.add('hidden');
    pageSlot.classList.add('hidden');
    pageEmotion.classList.add('hidden');
  }

  function goHome()  { hideAll(); pageHome.classList.remove('hidden'); }
  function goInput() { hideAll(); pageInput.classList.remove('hidden'); resetInput(); }
  function goSlot(sc) { hideAll(); pageSlot.classList.remove('hidden'); startSlotShow(sc); }
  function goEmotion() { hideAll(); pageEmotion.classList.remove('hidden'); }

  // ===== 波纹 =====
  function createRipple(e) {
    const t = e.currentTarget.getBoundingClientRect();
    const cx = e.clientX || (t.left + t.width/2);
    const cy = e.clientY || (t.top + t.height/2);
    const r = document.createElement('div'); r.className='ripple';
    r.style.left=(cx-8)+'px'; r.style.top=(cy-8)+'px';
    document.body.appendChild(r);
    r.addEventListener('animationend',()=>r.remove());
  }

  function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

  // ===== 主页按钮 =====
  document.querySelectorAll('#page-home .px-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const id = this.dataset.id;
      createRipple(e); vibrate(30);
      if (id === 'emperor') goInput();
      else if (id === 'B') goEmotion();
      else console.log(`[宝盒] ${id}`);
    });
  });

  // ===== 输入分数页面 =====
  const inputDisplay = document.getElementById('input-display');
  let inputBuf = '0';

  function resetInput() {
    inputBuf = '0';
    inputDisplay.textContent = '0';
  }

  document.querySelectorAll('#page-input .px-key').forEach(key => {
    key.addEventListener('click', function(e) {
      const k = this.dataset.k;
      vibrate(6);
      if (k === 'del') {
        inputBuf = inputBuf.length > 1 ? inputBuf.slice(0, -1) : '0';
      } else if (k === 'go') {
        const val = parseInt(inputBuf, 10) || 0;
        currentScore = Math.min(999, Math.max(0, val));
        vibrate(20);
        goSlot(currentScore);
        return;
      } else {
        if (inputBuf === '0') inputBuf = k;
        else if (inputBuf.length < 3) inputBuf += k;
      }
      const num = parseInt(inputBuf, 10) || 0;
      inputBuf = String(Math.min(999, num));
      inputDisplay.textContent = inputBuf;
    });
  });

  document.getElementById('btn-input-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20); goHome();
  });

  // ===== 展示台滚轴逻辑 =====
  const ITEM_HEIGHT = 44;
  const ITEMS_PER_CYCLE = 10;
  const STRIP_REPEATS = 10;
  const TOTAL_ITEMS = ITEMS_PER_CYCLE * STRIP_REPEATS;
  const SPIN_SPEED_BASE = 2.5;
  const SPIN_DURATION = 2000;
  const REEL_STOP_GAP = 400;

  const reelFrames = [0,1,2].map(i => document.getElementById(`reel-frame-${i}`));
  const reelStrips = [0,1,2].map(i => document.getElementById(`reel-strip-${i}`));
  const slotLightsBar = document.getElementById('slot-lights-bar');
  const slotLights = [...document.querySelectorAll('.px-light')];

  let isSpinning = false;
  let animFrameId = null;

  const reels = [0,1,2].map(() => ({
    position: 0, spinning: false, finalTarget: 0,
    speed: 0, _decelStarted: false, _decelFrom: 0, _decelTarget: 0,
    _decelDist: 0, _decelStartTime: 0, _decelDuration: 650
  }));

  function buildReelStrips() {
    reelStrips.forEach(strip => {
      let html = '';
      for (let r = 0; r < STRIP_REPEATS; r++)
        for (let n = 0; n < 10; n++)
          html += `<div class="reel-num">${n}</div>`;
      strip.innerHTML = html;
      strip.style.transform = 'translateY(0px)';
      strip.style.transition = 'none';
    });
  }

  function resetReels() {
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; animFrameId = null; }
    reels.forEach(r => {
      r.position = 0; r.spinning = false; r.finalTarget = 0; r.speed = 0;
      r._decelStarted = false;
    });
    reelStrips.forEach(s => { s.style.transition = 'none'; s.style.transform = 'translateY(0px)'; });
    reelFrames.forEach(f => { f.classList.remove('spinning', 'landed'); });
    slotLightsBar.classList.remove('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
  }

  function startSlotShow(score) {
    resetReels();
    setTimeout(() => { runSpin(score); }, 400);
  }

  function runSpin(score) {
    isSpinning = true;
    slotLightsBar.classList.add('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
    const digits = String(score).padStart(3, '0').split('').map(Number);

    reels.forEach((reel, i) => {
      reel.spinning = true;
      reel.finalTarget = digits[i];
      reel.speed = SPIN_SPEED_BASE + Math.random() * 0.8;
      reel._decelStarted = false;
      reelFrames[i].classList.add('spinning');
      reelFrames[i].classList.remove('landed');
      reelStrips[i].style.transition = 'none';
    });

    const startTime = performance.now();

    function animate(now) {
      const elapsed = now - startTime;

      reels.forEach((reel, i) => {
        if (!reel.spinning) return;

        const stopTime = SPIN_DURATION + i * REEL_STOP_GAP;

        if (elapsed < stopTime) {
          const rampUp = Math.min(1, elapsed / 600);
          reel.position += reel.speed * (0.6 + 0.4 * rampUp);
          const dp = ((Math.floor(reel.position) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;
        } else if (!reel._decelStarted) {
          reel._decelStarted = true;
          reel._decelFrom = reel.position;
          reel._decelStartTime = now;

          const cur = ((Math.floor(reel.position) % ITEMS_PER_CYCLE) + ITEMS_PER_CYCLE) % ITEMS_PER_CYCLE;
          let adv = reel.finalTarget - cur;
          if (adv <= 0) adv += ITEMS_PER_CYCLE;
          adv += (2 + i) * ITEMS_PER_CYCLE;

          reel._decelTarget = Math.floor(reel.position) + adv;
          reel._decelDist = reel._decelTarget - reel.position;
          reel._decelDuration = 550 + i * 120;
        } else {
          const dt = now - reel._decelStartTime;
          const t = Math.min(1, dt / reel._decelDuration);
          const eased = 1 - Math.pow(1 - t, 4);
          const pos = reel._decelFrom + reel._decelDist * eased;
          const dp = ((Math.floor(pos) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;

          if (t >= 1) {
            const fdp = ((reel._decelTarget % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
            reelStrips[i].style.transform = `translateY(-${fdp * ITEM_HEIGHT}px)`;
            reel.spinning = false;
            reel.position = reel._decelTarget;

            reelFrames[i].classList.remove('spinning');
            reelFrames[i].classList.add('landed');
            vibrate(10);
            spawnPixelBurst(reelFrames[i]);
            setTimeout(() => reelFrames[i].classList.remove('landed'), 400);
          }
        }
      });

      if (reels.some(r => r.spinning)) {
        animFrameId = requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
        slotLightsBar.classList.remove('chasing');
        settleLights(score);
        setTimeout(() => vibrate([12, 24, 12]), 200);
      }
    }

    animFrameId = requestAnimationFrame(animate);
  }

  // 像素爆发
  function spawnPixelBurst(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#68c848','#88d858','#48a828','#f8c860','#f8a0b0','#f8e8c0'];
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
      const dist = 20 + Math.random() * 30;
      const bx = Math.cos(angle) * dist;
      const by = Math.sin(angle) * dist;
      const p = document.createElement('div');
      p.className = 'px-burst';
      p.style.left = (cx - 3) + 'px';
      p.style.top = (cy - 3) + 'px';
      p.style.setProperty('--bx', bx + 'px');
      p.style.setProperty('--by', by + 'px');
      p.style.setProperty('--bdur', (0.4 + Math.random() * 0.4) + 's');
      p.style.setProperty('--bc', colors[Math.floor(Math.random() * colors.length)]);
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  function settleLights(score) {
    const total = slotLights.length;
    const ratio = Math.min(1, Math.max(0, score / 999));
    const litCount = Math.round(ratio * total);
    slotLights.forEach((light, i) => {
      if (i < litCount) light.classList.add('lit');
      else light.classList.remove('lit');
    });
  }

  // ===== 展示台按钮 =====
  document.getElementById('btn-slot-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goHome();
  });

  document.getElementById('btn-retry').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goInput();
  });

  buildReelStrips();

  // ===========================================================
  //  小皇帝和情绪
  // ===========================================================

  const emoConfig = {
    mood:     { color:'#BE9C4E', glow:'rgba(190,156,78,0.25)' },
    stress:   { color:'#4C9178', glow:'rgba(76,145,120,0.25)' },
    energy:   { color:'#5DA82E', glow:'rgba(93,168,46,0.25)' },
    physical: { color:'#4A8C3F', glow:'rgba(74,140,63,0.25)' },
    love:     { color:'#C4867A', glow:'rgba(196,134,122,0.25)' }
  };

  function spawnEmoPop(el, color) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    for (let i=0; i<8; i++) {
      const a = (Math.PI*2*i)/8 + Math.random()*0.3;
      const d = 12 + Math.random()*18;
      const p = document.createElement('div');
      p.className = 'emo-pop';
      p.style.left = (cx-3)+'px'; p.style.top = (cy-3)+'px';
      p.style.setProperty('--bx', Math.cos(a)*d+'px');
      p.style.setProperty('--by', Math.sin(a)*d+'px');
      p.style.setProperty('--ep', color);
      p.style.animationDuration = (0.3+Math.random()*0.3)+'s';
      document.body.appendChild(p);
      p.addEventListener('animationend', ()=>p.remove());
    }
  }

  function updateEmoTicks(ticks, val, tc, tg) {
    const idx = val + 2;
    ticks.forEach((t,i)=>{
      if (i===idx) { t.classList.add('near'); t.style.setProperty('--tc',tc); t.style.setProperty('--tg',tg); }
      else t.classList.remove('near');
    });
  }

  document.querySelectorAll('.px-emo-card').forEach(card=>{
    const key = card.dataset.key;
    const cfg = emoConfig[key];
    const slider = card.querySelector('.emo-slider');
    const ticks = card.querySelectorAll('.px-emo-tick');

    slider.style.setProperty('--tc', cfg.color);
    slider.style.setProperty('--tg', cfg.glow);
    updateEmoTicks(ticks, 0, cfg.color, cfg.glow);

    slider.addEventListener('input', ()=>{
      const v = parseInt(slider.value);
      const pct = ((v+2)/4)*100;
      slider.style.setProperty('--fill', pct+'%');
      updateEmoTicks(ticks, v, cfg.color, cfg.glow);
    });

    slider.addEventListener('change', ()=>{
      card.classList.add('flash');
      setTimeout(()=>card.classList.remove('flash'), 300);
      spawnEmoPop(slider, cfg.color);
      vibrate(6);
    });
  });

  document.getElementById('btn-emotion-back').addEventListener('click', function(e){
    createRipple(e); vibrate(20); goHome();
  });
</script>

</body>
</html>
