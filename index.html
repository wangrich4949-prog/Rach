<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rach的宝盒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: linear-gradient(180deg, #1a0a2e 0%, #2d1060 30%, #1a0a2e 70%, #0d0420 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== 像素星星背景 ===== */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffec8b;
    box-shadow:
      2px 0 0 #ffec8b,
      4px 0 0 #ffd700,
      0 2px 0 #ffec8b,
      0 4px 0 #ffd700,
      2px 2px 0 #fff;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ===== 主容器 ===== */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ===== 像素装饰边框四个角 ===== */
  .corner-decor {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px 16px 28px;
    border: 4px solid #c9a100;
    box-shadow:
      -4px -4px 0 0 #1a0a2e,
      4px -4px 0 0 #1a0a2e,
      -4px 4px 0 0 #1a0a2e,
      4px 4px 0 0 #1a0a2e,
      0 0 0 8px #2d1060,
      -8px -8px 0 0 #ffd700,
      8px -8px 0 0 #ffd700,
      -8px 8px 0 0 #ffd700,
      8px 8px 0 0 #ffd700;
    image-rendering: pixelated;
  }

  /* ===== 标题 ===== */
  .title {
    font-size: 22px;
    color: #ffd700;
    text-align: center;
    letter-spacing: 2px;
    line-height: 1.6;
    text-shadow:
      2px 2px 0 #c9a100,
      -2px -2px 0 #c9a100,
      0 0 10px #ffec8b,
      0 0 20px #ffd700aa;
    image-rendering: pixelated;
    position: relative;
  }
  .title::before,
  .title::after {
    content: '✦';
    color: #ffec8b;
    text-shadow: 0 0 8px #ffd700;
    font-size: 16px;
  }
  .title::before { margin-right: 6px; }
  .title::after  { margin-left: 6px; }

  /* 标题下方像素分割线 */
  .divider {
    width: 80%;
    height: 6px;
    background: repeating-linear-gradient(
      90deg,
      #ffd700 0px,
      #ffd700 8px,
      transparent 8px,
      transparent 16px
    );
    margin: 4px 0;
  }

  /* ===== ABCD 按钮 ===== */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    padding: 0 8px;
  }

  .pixel-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 20px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: #ffec8b;
    background: linear-gradient(180deg, #6b3fa0, #4a1d8a);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow:
      2px 2px 0 #2d1060,
      0 0 6px #ffd70066;
    /* 像素边框 */
    box-shadow:
      -4px -4px 0 0 #ffd700,
      4px -4px 0 0 #ffd700,
      -4px 4px 0 0 #ffd700,
      4px 4px 0 0 #ffd700,
      0 0 0 4px #2d1060,
      -8px 0 0 0 #1a0a2e,
      8px 0 0 0 #1a0a2e;
    transition: transform 0.06s, box-shadow 0.06s;
    image-rendering: pixelated;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 按钮激活（按下）效果 - 像素位移 */
  .pixel-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
      -6px -6px 0 0 #ffd700,
      2px -6px 0 0 #ffd700,
      -6px 2px 0 0 #ffd700,
      2px 2px 0 0 #ffd700,
      0 0 0 4px #2d1060,
      -8px 0 0 0 #1a0a2e,
      8px 0 0 0 #1a0a2e;
    background: linear-gradient(180deg, #5a2f8a, #3a1570);
  }

  /* 按钮两侧像素小方块装饰 */
  .pixel-btn::before,
  .pixel-btn::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: #ffd700;
    box-shadow: 0 4px 0 #c9a100;
  }
  .pixel-btn::before { left: 18px; }
  .pixel-btn::after  { right: 18px; }

  /* 按钮文字标签 */
  .btn-label {
    display: block;
    font-size: 10px;
    color: #c9a100;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ===== 底部信息 ===== */
  .footer {
    margin-top: 8px;
    font-size: 8px;
    color: #6b3fa0;
    text-align: center;
    letter-spacing: 1px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.8; }
  }

  /* ===== 点击波纹 ===== */
  .ripple {
    position: fixed;
    width: 16px;
    height: 16px;
    background: #ffd700;
    pointer-events: none;
    z-index: 99;
    animation: rippleOut 0.4s steps(4) forwards;
    image-rendering: pixelated;
  }
  @keyframes rippleOut {
    0% {
      transform: scale(1);
      opacity: 1;
    }
    100% {
      transform: scale(6);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<!-- 像素星星 -->
<div class="stars" id="stars"></div>

<!-- 主容器 -->
<div class="container">
  <div class="corner-decor">
    <h1 class="title">Rach的宝盒</h1>
    <div class="divider"></div>
  </div>

  <div class="btn-group">
    <button class="pixel-btn" data-id="A">A</button>
    <button class="pixel-btn" data-id="B">B</button>
    <button class="pixel-btn" data-id="C">C</button>
    <button class="pixel-btn" data-id="D">D</button>
  </div>

  <div class="footer">PRESS START</div>
</div>

<script>
  // ===== 生成随机像素星星 =====
  (function() {
    const starsEl = document.getElementById('stars');
    const count = 24;
    let html = '';
    for (let i = 0; i < count; i++) {
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const dur = 2 + Math.random() * 3;
      const delay = Math.random() * 3;
      html += `<div class="star" style="left:${x}%;top:${y}%;--dur:${dur}s;--delay:${delay}s;"></div>`;
    }
    starsEl.innerHTML = html;
  })();

  // ===== 按钮点击事件 + 像素波纹 =====
  document.querySelectorAll('.pixel-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const id = this.dataset.id;
      const rect = this.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      // 创建波纹
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = (cx - 8) + 'px';
      ripple.style.top = (cy - 8) + 'px';
      document.body.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      // 触觉反馈（支持的系统）
      if (navigator.vibrate) {
        navigator.vibrate(30);
      }

      // 在控制台输出（可替换为实际跳转逻辑）
      console.log(`[宝盒] 按钮 ${id} 被点击`);
    });
  });
</script>

</body>
</html>
