<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rach的宝盒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  /* ===== 樱花色彩变量 ===== */
  :root {
    --bg-base:    #fdf2f5;
    --bg-deep:    #f8e4ea;
    --surface:    rgba(255, 248, 250, 0.88);
    --surface2:   rgba(255, 242, 246, 0.92);
    --text:       #4a2530;
    --text-light: #7a5560;
    --text-muted: #a8808a;
    --accent:     #e8909a;
    --accent2:    #f0a8b0;
    --accent-deep:#d4748c;
    --dot-pink:   #c4627a;
    --line-pink:  #d48498;
    --rose:       #c8506a;
    --rose-light: #e8a0a8;
    --blush:      #f8d0d8;
    --cream:      #fff8f5;
    --shadow-sm:  0 2px 12px rgba(180, 90, 110, 0.08);
    --shadow-md:  0 6px 28px rgba(180, 90, 110, 0.12);
    --shadow-lg:  0 12px 40px rgba(160, 70, 90, 0.15);
    --radius-sm:  14px;
    --radius-md:  22px;
    --radius-lg:  30px;
  }

  body {
    background: var(--bg-base);
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
    overflow-x: hidden; user-select: none; -webkit-user-select: none;
  }

  /* ===== 纹理背景 Canvas ===== */
  #texture-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; opacity: 0.85;
  }

  /* ===== 页面容器 ===== */
  .page { position:relative; z-index:10; width:100%; display:flex; flex-direction:column; align-items:center; }
  .page.hidden { display:none; }
  .container { width:100%; max-width:390px; padding:20px 14px; display:flex; flex-direction:column; align-items:center; gap:18px; }

  /* ===== 卡片 ===== */
  .px-card {
    position:relative; width:100%; display:flex; flex-direction:column; align-items:center;
    gap:14px; padding:28px 20px 24px;
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(220, 160, 170, 0.25);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    transition: box-shadow .4s ease;
  }

  /* ===== 标题 ===== */
  .px-title {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 18px; color: var(--text);
    text-align: center; line-height: 1.8; letter-spacing: 4px;
    font-weight: 400;
  }

  /* ===== 分割线 ===== */
  .px-divider {
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
    border-radius: 1px;
    opacity: 0.6;
  }

  /* ===== 按钮组 ===== */
  .btn-group { display:flex; flex-direction:column; gap:14px; width:100%; padding:0 4px; }

  .px-btn {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:100%; padding:17px 0;
    font-family: 'Noto Serif SC', serif; font-size:14px; font-weight: 500;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid rgba(210, 150, 160, 0.3);
    border-radius: var(--radius-md);
    cursor: pointer; letter-spacing: 3px; outline: none;
    box-shadow: var(--shadow-sm);
    transition: all .25s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .px-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232,144,154,0.12), rgba(240,168,176,0.06));
    opacity: 0; transition: opacity .25s;
  }
  .px-btn:hover::after { opacity: 1; }
  .px-btn:active {
    transform: scale(0.97);
    box-shadow: 0 1px 6px rgba(180, 90, 110, 0.06);
    background: var(--blush);
  }

  /* 皇帝按钮 - 玫瑰金色 */
  .px-btn-emperor {
    background: linear-gradient(135deg, #fef5f5, #fde8ec, #fce0e6);
    color: var(--rose);
    font-size: 15px; font-weight: 600; letter-spacing: 5px;
    border: 1.5px solid rgba(200, 80, 106, 0.3);
    box-shadow: 0 4px 20px rgba(190, 80, 110, 0.12);
  }
  .px-btn-emperor::after {
    background: linear-gradient(135deg, rgba(200,80,106,0.1), rgba(220,120,140,0.05));
  }
  .px-btn-emperor:active {
    background: linear-gradient(135deg, #fde8ec, #fad8e0);
    box-shadow: 0 2px 10px rgba(180, 70, 100, 0.08);
  }

  /* ===== 底部信息 ===== */
  .px-footer {
    margin-top:6px; font-family: 'Noto Serif SC', serif;
    font-size: 11px; color: var(--text-muted); text-align:center; letter-spacing:4px;
    animation: softPulse 3s ease-in-out infinite;
    font-weight: 300;
  }
  @keyframes softPulse { 0%,100%{opacity:0.5} 50%{opacity:0.85} }

  /* ===== 波纹 ===== */
  .ripple {
    position:fixed; width:20px; height:20px;
    border-radius: 50%;
    background: rgba(200, 80, 106, 0.18);
    pointer-events:none; z-index:99;
    animation: rippleOut .5s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes rippleOut {
    0%{transform:scale(0.3);opacity:.7}
    100%{transform:scale(5);opacity:0}
  }

  /* ============================================ */
  /*  输入分数页面                                 */
  /* ============================================ */

  .px-input-title {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 15px; color: var(--text); text-align:center; letter-spacing:4px; font-weight: 400;
  }
  .px-input-hint {
    font-size: 11px; color: var(--text-muted); text-align:center; letter-spacing:2px;
    font-family: 'Noto Serif SC', serif; font-weight: 300;
  }

  /* 分数显示框 */
  .px-input-box {
    width:100%;
    background: var(--surface);
    border: 1px solid rgba(210, 150, 160, 0.2);
    border-radius: var(--radius-md);
    padding:16px;
    box-shadow: var(--shadow-sm);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .px-input-display {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 36px; font-weight: 400;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid rgba(210, 150, 160, 0.15);
    border-radius: var(--radius-sm);
    padding:18px; text-align:center;
    margin-bottom:16px; letter-spacing:6px;
    box-shadow: inset 0 2px 8px rgba(180, 100, 120, 0.06);
  }

  /* 数字键盘 */
  .px-numpad { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }

  .px-key {
    font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 500;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid rgba(210, 150, 160, 0.2);
    border-radius: var(--radius-sm);
    padding:15px 0; cursor:pointer; text-align:center;
    box-shadow: var(--shadow-sm);
    transition: all .15s cubic-bezier(.4,0,.2,1); outline:none;
  }
  .px-key:active {
    transform: scale(0.94);
    background: var(--blush);
    box-shadow: 0 1px 4px rgba(180, 90, 110, 0.04);
  }
  .px-key-del {
    font-size: 12px; background: #fde8ec; color: var(--rose);
    border-color: rgba(200, 80, 106, 0.25);
  }
  .px-key-del:active { background: #fad4dc; }
  .px-key-go {
    font-size: 14px; font-weight: 600;
    background: linear-gradient(135deg, #fef0f2, #fde4e8);
    color: var(--rose);
    border-color: rgba(200, 80, 106, 0.35);
    box-shadow: 0 4px 16px rgba(200, 80, 106, 0.1);
    letter-spacing: 2px;
  }
  .px-key-go:active { background: linear-gradient(135deg, #fde4e8, #fad4dc); }

  /* 输入页底部按钮 */
  .px-input-bottom { display:flex; gap:10px; width:100%; }
  .px-input-bottom .px-btn { flex:1; font-size:12px; padding:14px 0; }
  .px-back-btn { font-size: 12px !important; padding: 13px 0 !important; background: rgba(220,200,205,0.4) !important; }

  /* ============================================ */
  /*  展示台                                       */
  /* ============================================ */

  .px-slot-title {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 15px; color: var(--text); text-align:center; letter-spacing:4px; font-weight: 400;
  }

  /* 花冠 → 樱花装饰 */
  .px-crown {
    display:flex; justify-content:center; align-items:flex-end;
    gap:8px; height:40px; margin-bottom:-2px; position:relative; z-index:2;
  }
  .px-crown-flower {
    width: 14px; height: 14px;
    background: var(--accent-deep);
    border-radius: 70% 30% 50% 50%;
    box-shadow: 0 0 8px rgba(212,116,140,0.35);
    animation: petalFloat 3s ease-in-out infinite;
  }
  .px-crown-flower.center {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 60% 40% 55% 45%;
    box-shadow: 0 0 14px rgba(232,144,154,0.4);
    animation: petalFloat 2.5s ease-in-out .3s infinite;
  }
  .px-crown-flower:nth-child(3) { animation-delay: .6s; }
  @keyframes petalFloat {
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-4px) rotate(3deg); }
  }

  /* 展示头部 */
  .px-display-head {
    width:84%; margin:0 auto;
    background: linear-gradient(180deg, #fef5f6, #fde8ec);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border: 1px solid rgba(210, 150, 160, 0.2);
    border-bottom: none;
    box-shadow: 0 -2px 12px rgba(180, 90, 110, 0.06);
    padding:14px 10px 10px;
    text-align:center; position:relative; z-index:1;
  }

  /* 花苞灯 */
  .px-lights { display:flex; justify-content:center; gap:8px; margin-top:6px; }
  .px-light {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(200, 140, 150, 0.25);
    transition: all .3s cubic-bezier(.4,0,.2,1);
  }
  .px-light.lit {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(232,144,154,0.5), 0 0 20px rgba(232,144,154,0.25);
    transform: scale(1.3);
  }
  .px-lights.chasing .px-light {
    animation: sakuraChase .65s ease-in-out infinite;
  }
  .px-lights.chasing .px-light:nth-child(1){animation-delay:0s}
  .px-lights.chasing .px-light:nth-child(2){animation-delay:.08s}
  .px-lights.chasing .px-light:nth-child(3){animation-delay:.16s}
  .px-lights.chasing .px-light:nth-child(4){animation-delay:.24s}
  .px-lights.chasing .px-light:nth-child(5){animation-delay:.32s}
  .px-lights.chasing .px-light:nth-child(6){animation-delay:.40s}
  .px-lights.chasing .px-light:nth-child(7){animation-delay:.48s}
  @keyframes sakuraChase {
    0%,14%  { background:var(--accent); box-shadow:0 0 12px var(--accent2); transform:scale(1.3); }
    15%,100%{ background:rgba(200,140,150,0.25); box-shadow:none; transform:scale(1); }
  }

  /* 展示机身 */
  .px-display-body {
    width:80%; margin:0 auto;
    background: linear-gradient(180deg, #fef5f7, #fdf0f3);
    border-left: 1px solid rgba(210,150,160,0.2);
    border-right: 1px solid rgba(210,150,160,0.2);
    padding:12px 8px 8px; position:relative;
  }

  /* 屏幕框 */
  .px-bezel {
    padding:8px;
    background: #fef8f9;
    border-radius: var(--radius-sm);
    box-shadow: inset 0 2px 8px rgba(180,100,120,0.08);
    border: 1px solid rgba(210,150,160,0.15);
  }
  .px-screen {
    background: var(--cream);
    border-radius: 8px;
    box-shadow: inset 0 2px 6px rgba(180,100,120,0.06);
    padding:10px 6px 6px;
  }

  /* 滚轴 */
  .px-reels { display:flex; justify-content:center; gap:10px; padding:6px 0; position:relative; z-index:1; }

  .reel-frame {
    position:relative; width:70px; height:52px;
    background: #fef5f6;
    border-radius: 10px;
    border: 1.5px solid rgba(210,150,160,0.25);
    box-shadow: inset 0 2px 10px rgba(180,100,120,0.08);
    overflow:hidden;
  }
  .reel-frame::before {
    content:''; position:absolute; top:0;left:0;right:0;height:40%;
    background:linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
    z-index:3; pointer-events:none; border-radius: 10px 10px 0 0;
  }
  .reel-frame::after {
    content:''; position:absolute; left:0;right:0; top:50%;
    height:1.5px; background:var(--accent);
    box-shadow:0 0 8px rgba(232,144,154,0.3);
    z-index:3; pointer-events:none;
  }

  .reel-strip { position:absolute; left:0; width:100%; will-change:transform; }
  .reel-num {
    display:flex; align-items:center; justify-content:center;
    height:46px;
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 28px; font-weight: 400;
    color: var(--text);
  }

  /* 屏幕底部 */
  .px-display-label {
    text-align:center; font-family: 'Noto Serif SC', serif;
    font-size: 9px; color: var(--text-muted); letter-spacing:6px;
    padding:5px 0 3px; opacity:.7; font-weight: 300;
  }

  /* 装饰搁板 */
  .px-shelf {
    width:88%; margin:0 auto;
    background: linear-gradient(180deg, #fef5f7, #fdeef2);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    border: 1px solid rgba(210,150,160,0.18);
    border-top: none;
    box-shadow: 0 2px 8px rgba(180,90,110,0.05);
    padding:10px 14px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .px-shelf-moss { flex:1; height:1px; background: rgba(210,150,160,0.25); }
  .px-shelf-gem {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(232,144,154,0.3); flex-shrink:0;
  }
  .px-shelf-gem.sm {
    width: 7px; height: 7px;
    background: var(--accent-deep);
    box-shadow: 0 0 6px rgba(212,116,140,0.25);
  }

  /* 底座 */
  .px-base {
    width:80%; margin:0 auto;
    background: linear-gradient(180deg, #fef3f5, #fde8ec);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    border: 1px solid rgba(210,150,160,0.15);
    border-top: none;
    box-shadow: 0 4px 12px rgba(180,90,110,0.06);
    padding:8px 10px 10px;
  }
  .px-base-line { height:1px; margin:5px 0; background: rgba(210,150,160,0.18); }
  .px-foot {
    width:88%; height: 12px; margin:0 auto -4px;
    background: linear-gradient(180deg, #fdf0f3, #fde4e9);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    border: 1px solid rgba(210,150,160,0.12);
    border-top: none;
    box-shadow: 0 4px 14px rgba(180,90,110,0.06);
  }

  /* 滚轴动画 */
  .reel-frame.spinning {
    animation: sakuraSpinGlow .35s ease-in-out infinite;
  }
  @keyframes sakuraSpinGlow {
    0%,100%{ box-shadow:inset 0 2px 10px rgba(180,100,120,0.08); border-color:rgba(210,150,160,0.25); }
    50%{ box-shadow:inset 0 2px 10px rgba(180,100,120,0.08), 0 0 16px rgba(232,144,154,0.3); border-color:rgba(232,144,154,0.5); }
  }
  .reel-frame.landed {
    animation: sakuraLandFlash .5s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes sakuraLandFlash {
    0%{ box-shadow:0 0 0 2px var(--accent), 0 0 24px rgba(232,144,154,0.4); transform:scale(1.06); }
    100%{ box-shadow:inset 0 2px 10px rgba(180,100,120,0.08); border-color:rgba(210,150,160,0.25); transform:scale(1); }
  }

  /* 爆发粒子 */
  .px-burst {
    position:fixed; pointer-events:none; z-index:100;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--bc, #e8909a);
    animation: sakuraBurstOut var(--bdur, .65s) cubic-bezier(.4,0,.2,1) forwards;
    box-shadow: 0 0 4px rgba(232,144,154,0.4);
  }
  @keyframes sakuraBurstOut {
    0%   { transform:translate(0,0) scale(.3); opacity:1; }
    100% { transform:translate(var(--bx),var(--by)) scale(0); opacity:0; }
  }

  /* 底部按钮 */
  .px-slot-bottom { display:flex; gap:10px; width:100%; margin-top:12px; }
  .px-slot-bottom .px-btn { flex:1; font-size:12px; padding:14px 0; }
  .px-retry-btn {
    font-size: 12px !important; padding: 14px 0 !important;
    background: linear-gradient(135deg, #fef0f2, #fde4e8) !important;
    color: var(--rose) !important;
    border-color: rgba(200,80,106,0.3) !important;
    font-weight: 600 !important;
  }

  /* ============================================ */
  /*  小皇帝和情绪 — 和纸质感 UI                   */
  /* ============================================ */

  .px-emo-scroll {
    width:100%; display:flex; flex-direction:column; gap:8px;
    padding:2px 0;
  }

  .px-emo-card {
    background: linear-gradient(180deg,
      rgba(255,248,250,0.9) 0%,
      rgba(254,240,244,0.92) 40%,
      rgba(253,232,238,0.88) 100%);
    padding:10px 16px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(210,150,160,0.2);
    box-shadow: 0 2px 10px rgba(180,90,110,0.05);
    transition: all .3s ease;
    position: relative;
    overflow: hidden;
  }
  /* 和纸纤维纹理 */
  .px-emo-card::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(220,150,160,0.06) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(210,140,150,0.04) 0%, transparent 40%),
      radial-gradient(circle at 50% 20%, rgba(230,160,170,0.05) 0%, transparent 30%);
    border-radius: var(--radius-sm);
  }
  .px-emo-card.flash {
    box-shadow: 0 2px 10px rgba(180,90,110,0.05), 0 0 22px rgba(232,144,154,0.25);
    border-color: rgba(232,144,154,0.4);
  }

  .px-emo-name {
    font-family: 'Noto Serif SC', serif; font-size: 11px; font-weight: 500;
    color: var(--text); letter-spacing: 3px; text-align: center;
    position: relative; z-index: 1;
  }

  .px-emo-slider-wrap { position:relative; padding:6px 0 3px; z-index: 1; }

  .px-emo-ticks {
    display:flex; justify-content:space-between;
    padding:0 10px; margin-bottom:-1px;
    position:relative; z-index:2; pointer-events:none;
  }
  .px-emo-tick {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(180,130,140,0.3);
    transition: all .2s cubic-bezier(.4,0,.2,1);
  }
  .px-emo-tick.near {
    background: var(--tc); transform:scale(1.7);
    box-shadow: 0 0 8px var(--tg);
  }

  .emo-slider {
    -webkit-appearance:none; appearance:none;
    width:100%; height:24px; background:transparent;
    cursor:pointer; outline:none; margin:0;
    position:relative; z-index:3;
  }
  .emo-slider::-webkit-slider-runnable-track {
    width:100%; height: 3px;
    background: rgba(180,130,140,0.2);
    border-radius: 2px;
    box-shadow: inset 0 1px 3px rgba(160,100,120,0.08);
  }
  .emo-slider::-moz-range-track {
    width:100%; height: 3px;
    background: rgba(180,130,140,0.2);
    border-radius: 2px;
    box-shadow: inset 0 1px 3px rgba(160,100,120,0.08);
  }
  .emo-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width: 20px; height: 20px; margin-top: -9px;
    border-radius: 50%;
    background: var(--tc);
    box-shadow: 0 2px 8px rgba(180,90,110,0.2), 0 0 0 3px rgba(255,255,255,0.5);
    cursor:pointer; transition: transform .15s;
  }
  .emo-slider::-webkit-slider-thumb:active { transform:scale(1.2); }
  .emo-slider::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--tc);
    box-shadow: 0 2px 8px rgba(180,90,110,0.2), 0 0 0 3px rgba(255,255,255,0.5);
    cursor:pointer;
  }

  .px-emo-labels {
    display:flex; justify-content:space-between;
    padding:0 6px; margin-top:4px; position: relative; z-index: 1;
  }
  .px-emo-label {
    font-family: 'Noto Serif SC', serif; font-size: 8px; font-weight: 300;
    color: var(--text-light); letter-spacing: 1px;
    line-height:1.5; max-width:42%;
  }
  .px-emo-label:first-child { text-align:left; }
  .px-emo-label:last-child  { text-align:right; }

  .emo-pop {
    position:fixed; pointer-events:none; z-index:100;

  }

  /* 情绪页紧凑覆盖 */

<script>
  // ===========================================================
  //  Canvas 纹理背景 — 斑点 + 线 + 斑块，带呼吸脉动
  // ===========================================================
  (function() {
    const canvas = document.getElementById('texture-canvas');
    const ctx = canvas.getContext('2d');
    let animId, w, h;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      w = window.innerWidth;
      h = window.innerHeight;
      if (!animId) drawAndLoop();
    }

    // 伪随机数生成器 (确定性)
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }

    const rand = seededRandom(20260603);

    // ---- 数据生成 ----
    const dots = [];
    const lines = [];
    const blobs = [];

    // 斑点 (极小、极密、呈微尘斑点状分布)
    for (let i = 0; i < 5200; i++) {
      dots.push({
        x: rand() * 100,
        y: rand() * 100,
        r: 0.025 + rand() * 0.095,         // 缩小10倍的微尘斑点
        baseAlpha: 0.03 + rand() * 0.09,   // 基础透明度
        hue: 340 + rand() * 20,
        sat: 28 + rand() * 30,
        light: 52 + rand() * 32,
        phase: rand() * Math.PI * 2,        // 呼吸相位偏移
        speed: 0.3 + rand() * 0.5           // 呼吸速度微差
      });
    }

    // 纤维线 (更细)
    for (let i = 0; i < 38; i++) {
      const startX = rand() * 100;
      const startY = rand() * 100;
      const points = [];
      const numPts = 3 + Math.floor(rand() * 5);
      let cx = startX, cy = startY;
      for (let j = 0; j < numPts; j++) {
        cx += (rand() - 0.5) * 18;
        cy += (rand() - 0.5) * 14;
        points.push({ x: cx, y: cy });
      }
      lines.push({
        points,
        baseAlpha: 0.025 + rand() * 0.055,
        width: 0.3 + rand() * 0.7,
        hue: 340 + rand() * 20,
        sat: 20 + rand() * 30,
        light: 58 + rand() * 25,
        phase: rand() * Math.PI * 2,
        speed: 0.25 + rand() * 0.45
      });
    }

    // 不规则斑块
    for (let i = 0; i < 18; i++) {
      blobs.push({
        x: rand() * 100,
        y: rand() * 100,
        rx: 20 + rand() * 80,
        ry: 15 + rand() * 55,
        baseAlpha: 0.012 + rand() * 0.035,
        hue: 340 + rand() * 20,
        sat: 15 + rand() * 25,
        light: 60 + rand() * 25,
        angle: rand() * Math.PI,
        phase: rand() * Math.PI * 2,
        speed: 0.2 + rand() * 0.35
      });
    }

    // ---- 呼吸系数 ----
    // 全局呼吸周期 ~5.5 秒；用正弦波模拟："吸气"变亮 → "呼气"变暗
    function breath(phase, speed, t) {
      // sin 范围 [-1, 1] → 映射到 [0.55, 1.0]，形成柔和的呼吸感
      const raw = Math.sin(t * speed * 0.00114 + phase);
      return 0.55 + (raw + 1) * 0.225;
    }

    function draw(timestamp) {
      ctx.clearRect(0, 0, w, h);

      // 基底渐变
      const baseGrad = ctx.createLinearGradient(0, 0, w, h);
      baseGrad.addColorStop(0, '#fdf2f5');
      baseGrad.addColorStop(0.35, '#fef5f7');
      baseGrad.addColorStop(0.65, '#fdf0f4');
      baseGrad.addColorStop(1, '#fdf2f5');
      ctx.fillStyle = baseGrad;
      ctx.fillRect(0, 0, w, h);

      // 斑块
      blobs.forEach(b => {
        const bf = breath(b.phase, b.speed, timestamp);
        ctx.save();
        const bx = b.x / 100 * w;
        const by = b.y / 100 * h;
        ctx.translate(bx, by);
        ctx.rotate(b.angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, b.rx, b.ry, 0, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${b.hue}, ${b.sat}%, ${b.light}%, ${b.baseAlpha * bf})`;
        ctx.fill();
        ctx.restore();
      });

      // 纤维线
      lines.forEach(l => {
        const lf = breath(l.phase, l.speed, timestamp);
        ctx.beginPath();
        const first = l.points[0];
        ctx.moveTo(first.x / 100 * w, first.y / 100 * h);
        for (let i = 1; i < l.points.length; i++) {
          const cp1x = l.points[i-1].x / 100 * w + (l.points[i].x - l.points[i-1].x) / 100 * w * 0.4;
          const cp1y = l.points[i-1].y / 100 * h + (l.points[i].y - l.points[i-1].y) / 100 * h * 0.3;
          const cp2x = l.points[i].x / 100 * w - (l.points[i].x - l.points[i-1].x) / 100 * w * 0.3;
          const cp2y = l.points[i].y / 100 * h - (l.points[i].y - l.points[i-1].y) / 100 * h * 0.25;
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, l.points[i].x / 100 * w, l.points[i].y / 100 * h);
        }
        ctx.strokeStyle = `hsla(${l.hue}, ${l.sat}%, ${l.light}%, ${l.baseAlpha * lf})`;
        ctx.lineWidth = l.width;
        ctx.lineCap = 'round';
        ctx.stroke();
      });

      // 斑点
      dots.forEach(d => {
        const bf = breath(d.phase, d.speed, timestamp);
        ctx.beginPath();
        ctx.arc(d.x / 100 * w, d.y / 100 * h, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${d.hue}, ${d.sat}%, ${d.light}%, ${d.baseAlpha * bf})`;
        ctx.fill();
      });
    }

    function loop(timestamp) {
      draw(timestamp);
      animId = requestAnimationFrame(loop);
    }

    function drawAndLoop() {
      if (animId) cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    w = window.innerWidth;
    h = window.innerHeight;
    drawAndLoop();
    window.addEventListener('resize', resize);
  })();

  // ===== 页面导航 =====
  const pageHome  = document.getElementById('page-home');
  const pageInput = document.getElementById('page-input');
  const pageSlot  = document.getElementById('page-slot');
  const pageEmotion = document.getElementById('page-emotion');
  let currentScore = 0;

  function hideAll() {
    pageHome.classList.add('hidden');
    pageInput.classList.add('hidden');
    pageSlot.classList.add('hidden');
    pageEmotion.classList.add('hidden');
  }

  function goHome()  { hideAll(); pageHome.classList.remove('hidden'); }
  function goInput() { hideAll(); pageInput.classList.remove('hidden'); resetInput(); }
  function goSlot(sc) { hideAll(); pageSlot.classList.remove('hidden'); startSlotShow(sc); }
  function goEmotion() { hideAll(); pageEmotion.classList.remove('hidden'); }

  // ===== 波纹 =====
  function createRipple(e) {
    const t = e.currentTarget.getBoundingClientRect();
    const cx = e.clientX || (t.left + t.width/2);
    const cy = e.clientY || (t.top + t.height/2);
    const r = document.createElement('div'); r.className='ripple';
    r.style.left=(cx-10)+'px'; r.style.top=(cy-10)+'px';
    document.body.appendChild(r);
    r.addEventListener('animationend',()=>r.remove());
  }

  function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

  // ===== 主页按钮 =====
  document.querySelectorAll('#page-home .px-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const id = this.dataset.id;
      createRipple(e); vibrate(30);
      if (id === 'emperor') goInput();
      else if (id === 'B') goEmotion();
      else console.log(`[宝盒] ${id}`);
    });
  });

  // ===== 输入分数页面 =====
  const inputDisplay = document.getElementById('input-display');
  let inputBuf = '0';

  function resetInput() {
    inputBuf = '0';
    inputDisplay.textContent = '0';
  }

  document.querySelectorAll('#page-input .px-key').forEach(key => {
    key.addEventListener('click', function(e) {
      const k = this.dataset.k;
      vibrate(6);
      if (k === 'del') {
        inputBuf = inputBuf.length > 1 ? inputBuf.slice(0, -1) : '0';
      } else if (k === 'go') {
        const val = parseInt(inputBuf, 10) || 0;
        currentScore = Math.min(999, Math.max(0, val));
        vibrate(20);
        goSlot(currentScore);
        return;
      } else {
        if (inputBuf === '0') inputBuf = k;
        else if (inputBuf.length < 3) inputBuf += k;
      }
      const num = parseInt(inputBuf, 10) || 0;
      inputBuf = String(Math.min(999, num));
      inputDisplay.textContent = inputBuf;
    });
  });

  document.getElementById('btn-input-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20); goHome();
  });

  // ===== 展示台滚轴逻辑 =====
  const ITEM_HEIGHT = 44;
  const ITEMS_PER_CYCLE = 10;
  const STRIP_REPEATS = 10;
  const TOTAL_ITEMS = ITEMS_PER_CYCLE * STRIP_REPEATS;
  const SPIN_SPEED_BASE = 2.5;
  const SPIN_DURATION = 2000;
  const REEL_STOP_GAP = 400;

  const reelFrames = [0,1,2].map(i => document.getElementById(`reel-frame-${i}`));
  const reelStrips = [0,1,2].map(i => document.getElementById(`reel-strip-${i}`));
  const slotLightsBar = document.getElementById('slot-lights-bar');
  const slotLights = [...document.querySelectorAll('.px-light')];

  let isSpinning = false;
  let animFrameId = null;

  const reels = [0,1,2].map(() => ({
    position: 0, spinning: false, finalTarget: 0,
    speed: 0, _decelStarted: false, _decelFrom: 0, _decelTarget: 0,
    _decelDist: 0, _decelStartTime: 0, _decelDuration: 650
  }));

  function buildReelStrips() {
    reelStrips.forEach(strip => {
      let html = '';
      for (let r = 0; r < STRIP_REPEATS; r++)
        for (let n = 0; n < 10; n++)
          html += `<div class="reel-num">${n}</div>`;
      strip.innerHTML = html;
      strip.style.transform = 'translateY(0px)';
      strip.style.transition = 'none';
    });
  }

  function resetReels() {
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; animFrameId = null; }
    reels.forEach(r => {
      r.position = 0; r.spinning = false; r.finalTarget = 0; r.speed = 0;
      r._decelStarted = false;
    });
    reelStrips.forEach(s => { s.style.transition = 'none'; s.style.transform = 'translateY(0px)'; });
    reelFrames.forEach(f => { f.classList.remove('spinning', 'landed'); });
    slotLightsBar.classList.remove('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
  }

  function startSlotShow(score) {
    resetReels();
    setTimeout(() => { runSpin(score); }, 400);
  }

  function runSpin(score) {
    isSpinning = true;
    slotLightsBar.classList.add('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
    const digits = String(score).padStart(3, '0').split('').map(Number);

    reels.forEach((reel, i) => {
      reel.spinning = true;
      reel.finalTarget = digits[i];
      reel.speed = SPIN_SPEED_BASE + Math.random() * 0.8;
      reel._decelStarted = false;
      reelFrames[i].classList.add('spinning');
      reelFrames[i].classList.remove('landed');
      reelStrips[i].style.transition = 'none';
    });

    const startTime = performance.now();

    function animate(now) {
      const elapsed = now - startTime;

      reels.forEach((reel, i) => {
        if (!reel.spinning) return;

        const stopTime = SPIN_DURATION + i * REEL_STOP_GAP;

        if (elapsed < stopTime) {
          const rampUp = Math.min(1, elapsed / 600);
          reel.position += reel.speed * (0.6 + 0.4 * rampUp);
          const dp = ((Math.floor(reel.position) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;
        } else if (!reel._decelStarted) {
          reel._decelStarted = true;
          reel._decelFrom = reel.position;
          reel._decelStartTime = now;

          const cur = ((Math.floor(reel.position) % ITEMS_PER_CYCLE) + ITEMS_PER_CYCLE) % ITEMS_PER_CYCLE;
          let adv = reel.finalTarget - cur;
          if (adv <= 0) adv += ITEMS_PER_CYCLE;
          adv += (2 + i) * ITEMS_PER_CYCLE;

          reel._decelTarget = Math.floor(reel.position) + adv;
          reel._decelDist = reel._decelTarget - reel.position;
          reel._decelDuration = 550 + i * 120;
        } else {
          const dt = now - reel._decelStartTime;
          const t = Math.min(1, dt / reel._decelDuration);
          const eased = 1 - Math.pow(1 - t, 4);
          const pos = reel._decelFrom + reel._decelDist * eased;
          const dp = ((Math.floor(pos) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;

          if (t >= 1) {
            const fdp = ((reel._decelTarget % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
            reelStrips[i].style.transform = `translateY(-${fdp * ITEM_HEIGHT}px)`;
            reel.spinning = false;
            reel.position = reel._decelTarget;

            reelFrames[i].classList.remove('spinning');
            reelFrames[i].classList.add('landed');
            vibrate(10);
            spawnPixelBurst(reelFrames[i]);
            setTimeout(() => reelFrames[i].classList.remove('landed'), 400);
          }
        }
      });

      if (reels.some(r => r.spinning)) {
        animFrameId = requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
        slotLightsBar.classList.remove('chasing');
        settleLights(score);
        setTimeout(() => vibrate([12, 24, 12]), 200);
      }
    }

    animFrameId = requestAnimationFrame(animate);
  }

  // 樱花粒子爆发
  function spawnPixelBurst(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#e8909a','#f0a8b0','#d4748c','#f0b0b8','#d88090','#f8c0c8','#e8a0a8','#f8d0d8'];
    for (let i = 0; i < 14; i++) {
      const angle = (Math.PI * 2 * i) / 14 + Math.random() * 0.3;
      const dist = 22 + Math.random() * 34;
      const bx = Math.cos(angle) * dist;
      const by = Math.sin(angle) * dist;
      const p = document.createElement('div');
      p.className = 'px-burst';
      p.style.left = (cx - 3) + 'px';
      p.style.top = (cy - 3) + 'px';
      p.style.setProperty('--bx', bx + 'px');
      p.style.setProperty('--by', by + 'px');
      p.style.setProperty('--bdur', (0.5 + Math.random() * 0.5) + 's');
      p.style.setProperty('--bc', colors[Math.floor(Math.random() * colors.length)]);
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  function settleLights(score) {
    const total = slotLights.length;
    const ratio = Math.min(1, Math.max(0, score / 999));
    const litCount = Math.round(ratio * total);
    slotLights.forEach((light, i) => {
      if (i < litCount) light.classList.add('lit');
      else light.classList.remove('lit');
    });
  }

  // ===== 展示台按钮 =====
  document.getElementById('btn-slot-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goHome();
  });

  document.getElementById('btn-retry').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goInput();
  });

  buildReelStrips();

  // ===========================================================
  //  小皇帝和情绪
  // ===========================================================

  const emoConfig = {
    mood:     { color:'#e8909a', glow:'rgba(232,144,154,0.4)' },
    stress:   { color:'#c8a0b0', glow:'rgba(200,160,176,0.4)' },
    energy:   { color:'#d88090', glow:'rgba(216,128,144,0.4)' },
    physical: { color:'#b898a8', glow:'rgba(184,152,168,0.4)' },
    love:     { color:'#e07080', glow:'rgba(224,112,128,0.4)' }
  };

  function spawnEmoPop(el, color) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    for (let i=0; i<8; i++) {
      const a = (Math.PI*2*i)/8 + Math.random()*0.3;
      const d = 12 + Math.random()*18;
      const p = document.createElement('div');
      p.className = 'emo-pop';
      p.style.left = (cx-3)+'px'; p.style.top = (cy-3)+'px';
      p.style.setProperty('--bx', Math.cos(a)*d+'px');
      p.style.setProperty('--by', Math.sin(a)*d+'px');
      p.style.setProperty('--ep', color);
      p.style.animationDuration = (0.3+Math.random()*0.3)+'s';
      document.body.appendChild(p);
      p.addEventListener('animationend', ()=>p.remove());
    }
  }

  function updateEmoTicks(ticks, val, tc, tg) {
    const idx = val + 2;
    ticks.forEach((t,i)=>{
      if (i===idx) { t.classList.add('near'); t.style.setProperty('--tc',tc); t.style.setProperty('--tg',tg); }
      else t.classList.remove('near');
    });
  }

  document.querySelectorAll('.px-emo-card').forEach(card=>{
    const key = card.dataset.key;
    const cfg = emoConfig[key];
    const slider = card.querySelector('.emo-slider');
    const ticks = card.querySelectorAll('.px-emo-tick');

    slider.style.setProperty('--tc', cfg.color);
    slider.style.setProperty('--tg', cfg.glow);
    updateEmoTicks(ticks, 0, cfg.color, cfg.glow);

    slider.addEventListener('input', ()=>{
      const v = parseInt(slider.value);
      const pct = ((v+2)/4)*100;
      slider.style.setProperty('--fill', pct+'%');
      updateEmoTicks(ticks, v, cfg.color, cfg.glow);
    });

    slider.addEventListener('change', ()=>{
      card.classList.add('flash');
      setTimeout(()=>card.classList.remove('flash'), 300);
      spawnEmoPop(slider, cfg.color);
      vibrate(6);
    });
  });

  document.getElementById('btn-emotion-back').addEventListener('click', function(e){
    createRipple(e); vibrate(20); goHome();
  });
</script>

</body>
