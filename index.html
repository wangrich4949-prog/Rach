<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rach的宝盒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: linear-gradient(180deg,
      #7EC8E3   0%,
      #B3DFF0  20%,
      #D6EDF5  38%,
      #F2F0D5  52%,
      #C5D88C  65%,
      #8CB84B  82%,
      #5A8F2C 100%
    );
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
    overflow-x: hidden; user-select: none; -webkit-user-select: none;
  }

  /* ===== 白云 ===== */
  .nature-scene { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .cloud {
    position:fixed; width:60px; height:24px;
    background:rgba(255,255,255,0.72);
    border-radius:50%;
    box-shadow:
      28px -8px 0 10px rgba(255,255,255,0.68),
      -20px -5px 0 14px rgba(255,255,255,0.62),
      58px 5px 0 6px rgba(255,255,255,0.55);
    animation:driftCloud var(--cdur, 22s) linear infinite;
  }
  @keyframes driftCloud {
    0%   { transform:translateX(-160px); }
    100% { transform:translateX(calc(100vw + 160px)); }
  }

  /* ===== 远山 ===== */
  .hill {
    position:fixed; bottom:0; border-radius:50% 50% 0 0;
  }
  .hill-back {
    width:130%; height:28vh; left:-15%; bottom:16vh;
    background:linear-gradient(180deg, #9CCC7A, #7BAF4A);
    opacity:0.55;
  }
  .hill-mid {
    width:110%; height:22vh; left:-5%; bottom:10vh;
    background:linear-gradient(180deg, #8BC34A, #689F38);
    opacity:0.7;
  }
  .hill-front {
    width:120%; height:16vh; left:-10%; bottom:3vh;
    background:linear-gradient(180deg, #7CB342, #558B2F);
    opacity:0.85;
  }

  /* ===== 树木 ===== */
  .tree {
    position:fixed; bottom:15vh;
    animation:swayTree var(--tsway, 5s) ease-in-out infinite;
    animation-delay:var(--tdelay, 0s);
    transform-origin:bottom center;
  }
  @keyframes swayTree {
    0%,100% { transform:rotate(-1.5deg); }
    50%     { transform:rotate(1.5deg); }
  }
  .tree-trunk {
    width:12px; height:70px;
    background:linear-gradient(90deg, #6D4C41, #5D4037, #4E342E);
    border-radius:4px 4px 10px 10px;
    margin:0 auto;
  }
  .tree-canopy {
    position:relative; width:80px; height:80px; margin-top:-20px; margin-left:-34px;
    background:radial-gradient(circle at 42% 38%, #9CCC65, #558B2F);
    border-radius:50%;
    box-shadow:
      -20px 10px 0 -6px #7CB342,
      22px 6px 0 -7px #689F38,
      6px -14px 0 -6px #AED581,
      -12px -18px 0 -5px #8BC34A,
      0 0 20px rgba(139,195,74,0.15);
  }
  .tree-canopy::after {
    content:''; position:absolute; top:12px; left:20px;
    width:35px; height:28px;
    background:rgba(174,213,129,0.4);
    border-radius:50%;
  }

  /* ===== 草地小花 ===== */
  .meadow-flower {
    position:fixed; bottom:var(--mfy, 8px);
    width:8px; height:8px;
    background:var(--mfc, #FFF);
    border-radius:50%;
    z-index:1;
    box-shadow:
      6px -2px 0 var(--mfc, #FFF),
      -5px -3px 0 var(--mfc, #FFF),
      0 -7px 0 var(--mfc, #FFF),
      2px 4px 0 #8BC34A;
    animation:swayFlower var(--mfdur, 4s) ease-in-out infinite;
    animation-delay:var(--mfdelay, 0s);
  }
  @keyframes swayFlower {
    0%,100% { transform:rotate(-2deg) translateX(0); }
    50%     { transform:rotate(3deg) translateX(2px); }
  }

  /* ===== 草地 ===== */
  .grass-blade {
    position:fixed; bottom:0;
    width:5px; height:var(--gh, 35px);
    background:linear-gradient(180deg, var(--gc, #9CCC65) 0%, #558B2F 90%);
    border-radius:60% 40% 0 0;
    transform-origin:bottom center;
    animation:swayGrass var(--sdur, 3.5s) ease-in-out infinite;
    animation-delay:var(--sdelay, 0s);
  }
  @keyframes swayGrass {
    0%,100% { transform:rotate(-3deg) skewX(-1deg); }
    25%     { transform:rotate(1deg) skewX(0.5deg); }
    50%     { transform:rotate(4deg) skewX(2deg); }
    75%     { transform:rotate(2deg) skewX(1deg); }
  }

  /* ===== 落叶 ===== */
  .falling-leaf {
    position:fixed; pointer-events:none; z-index:1;
    width:14px; height:16px;
    background:var(--lc, #7CB342);
    border-radius:50% 0 50% 0;
    opacity:0;
    animation:leafFall var(--fdur, 9s) linear infinite;
    animation-delay:var(--fdelay, 0s);
  }
  @keyframes leafFall {
    0%   { transform:translateY(-8vh) translateX(0) rotate(var(--lrot, 0deg)); opacity:0; }
    4%   { opacity:0.8; }
    35%  { transform:translateY(38vh) translateX(var(--ldrift, 35px)) rotate(calc(var(--lrot, 0deg) + 160deg)); opacity:0.75; }
    70%  { transform:translateY(72vh) translateX(calc(var(--ldrift, 35px) * -0.6)) rotate(calc(var(--lrot, 0deg) + 300deg)); opacity:0.5; }
    95%  { opacity:0.15; }
    100% { transform:translateY(108vh) translateX(var(--ldrift, 35px)) rotate(calc(var(--lrot, 0deg) + 420deg)); opacity:0; }
  }

  /* ===== 花瓣 ===== */
  .floating-petal {
    position:fixed; pointer-events:none; z-index:1;
    width:10px; height:11px;
    background:var(--pc, #F8BBD0);
    border-radius:50% 50% 0 50%;
    opacity:0;
    animation:petalDrift var(--pdur, 14s) ease-in-out infinite;
    animation-delay:var(--pdelay, 0s);
    transform:rotate(var(--prot, 15deg));
  }
  @keyframes petalDrift {
    0%   { transform:translate(0, -6vh) rotate(var(--prot, 15deg)); opacity:0; }
    8%   { opacity:0.7; }
    45%  { transform:translate(var(--pdrift, 55px), 50vh) rotate(calc(var(--prot, 15deg) + 150deg)); opacity:0.6; }
    88%  { opacity:0.3; }
    100% { transform:translate(calc(var(--pdrift, 55px) * 1.6), 108vh) rotate(calc(var(--prot, 15deg) + 340deg)); opacity:0; }
  }

  /* ===== 页面容器 ===== */
  .page { position:relative; z-index:2; width:100%; display:flex; flex-direction:column; align-items:center; }
  .page.hidden { display:none; }
  .container { width:100%; max-width:390px; padding:20px 14px; display:flex; flex-direction:column; align-items:center; gap:18px; }

  /* ===== 春日卡片 ===== */
  .spring-card {
    position:relative; width:100%; display:flex; flex-direction:column; align-items:center;
    gap:12px; padding:28px 20px 24px;
    background:
      repeating-linear-gradient(92deg, transparent, transparent 20px, rgba(139,195,74,0.05) 20px, rgba(139,195,74,0.05) 22px),
      linear-gradient(180deg, #FFFEF7, #F7F2E4);
    border:3px solid #A1887F;
    border-radius:20px;
    box-shadow:
      0 6px 24px rgba(62,107,39,0.13),
      0 2px 6px rgba(0,0,0,0.07),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* ===== 标题 ===== */
  .title {
    font-family:'Noto Serif SC',serif; font-size:23px; font-weight:700;
    color:#2E7D32; text-align:center; letter-spacing:4px; line-height:1.5;
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }
  .title .icon-left, .title .icon-right { font-size:18px; }

  /* ===== 分割线 ===== */
  .spring-divider {
    width:80%; height:3px;
    background:linear-gradient(90deg, transparent, #AED581, #8BC34A, #AED581, transparent);
    border-radius:2px;
  }

  /* ===== 按钮组 ===== */
  .btn-group { display:flex; flex-direction:column; gap:16px; width:100%; padding:0 4px; }

  .nature-btn {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:100%; padding:20px 0;
    font-family:'Noto Serif SC',serif; font-size:18px; font-weight:600;
    color:#4E342E;
    background:linear-gradient(180deg, #F5F0E8, #E0D5C5);
    border:2px solid #8D6E63; border-radius:16px;
    cursor:pointer; letter-spacing:3px; outline:none;
    box-shadow:
      0 4px 0 #A1887F,
      0 5px 12px rgba(0,0,0,0.10);
    transition:transform .10s, box-shadow .10s, background .10s;
    overflow:hidden;
  }
  .nature-btn:active {
    transform:translateY(3px);
    box-shadow:0 1px 0 #A1887F, 0 2px 6px rgba(0,0,0,0.08);
    background:linear-gradient(180deg, #E0D5C5, #D0C4B4);
  }

  /* 皇帝按钮 */
  .btn-emperor {
    background:linear-gradient(180deg, #FFF9C4, #FFE082);
    border-color:#C9A100;
    box-shadow:
      0 4px 0 #B8860B,
      0 5px 16px rgba(200,160,0,0.25);
    color:#5D4037;
  }
  .btn-emperor:active {
    background:linear-gradient(180deg, #FFE082, #FFD54F);
  }

  /* ===== 底部信息 ===== */
  .footer {
    margin-top:6px; font-family:'Noto Serif SC',serif;
    font-size:12px; color:#689F38; text-align:center; letter-spacing:2px;
    animation:footerBreathe 3s ease-in-out infinite;
  }
  @keyframes footerBreathe {
    0%,100%{opacity:.45} 50%{opacity:.85}
  }

  /* ===== 波纹 ===== */
  .ripple {
    position:fixed; width:20px; height:20px;
    background:rgba(139,195,74,0.35); pointer-events:none; z-index:99;
    border-radius:50%;
    animation:rippleOut .5s ease-out forwards;
  }
  @keyframes rippleOut {
    0%{transform:scale(0.5);opacity:.7}
    100%{transform:scale(5);opacity:0}
  }

  /* ============================================ */
  /*  输入分数页面                                 */
  /* ============================================ */

  .input-title {
    font-family:'Noto Serif SC',serif; font-size:16px; font-weight:600;
    color:#2E7D32; text-align:center; letter-spacing:2px;
  }
  .input-hint {
    font-size:13px; color:#8D6E63; text-align:center; letter-spacing:1px;
  }

  /* 分数显示框 */
  .score-input-box {
    width:100%;
    background:linear-gradient(180deg, #F5F0E8, #E0D5C5);
    border:3px solid #8D6E63; border-radius:16px;
    padding:14px;
    box-shadow:
      0 5px 16px rgba(62,107,39,0.10),
      inset 0 1px 0 rgba(255,255,255,0.45);
  }
  .score-input-display {
    font-family:'Quicksand',sans-serif; font-size:44px; font-weight:700;
    color:#3E2723;
    background:linear-gradient(180deg, #FFFEF7, #F7F2E4);
    border:2px solid #A1887F; border-radius:12px;
    padding:16px; text-align:center;
    box-shadow:inset 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom:14px; letter-spacing:4px;
  }

  /* 数字键盘 */
  .numpad-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }

  .numpad-key {
    font-family:'Quicksand',sans-serif; font-size:22px; font-weight:700;
    color:#4E342E;
    background:linear-gradient(180deg, #F5F0E8, #E8DCC8);
    border:2px solid #8D6E63; border-radius:14px;
    padding:15px 0; cursor:pointer; text-align:center;
    box-shadow:0 3px 0 #A1887F, 0 4px 8px rgba(0,0,0,0.10);
    transition:transform .06s, box-shadow .06s; outline:none;
  }
  .numpad-key:active {
    transform:translateY(2px);
    box-shadow:0 1px 0 #A1887F, 0 2px 4px rgba(0,0,0,0.10);
  }
  .numpad-key.key-del {
    font-size:13px; background:linear-gradient(180deg, #FFCDD2, #EF9A9A);
    border-color:#C62828; color:#B71C1C;
    box-shadow:0 3px 0 #C62828, 0 4px 8px rgba(0,0,0,0.10);
  }
  .numpad-key.key-go {
    font-size:15px; font-weight:700;
    background:linear-gradient(180deg, #81C784, #4CAF50);
    border-color:#2E7D32; color:#FFF;
    box-shadow:0 3px 0 #388E3C, 0 4px 8px rgba(0,0,0,0.10), 0 0 14px rgba(76,175,80,0.35);
  }

  /* 输入页底部按钮 */
  .input-bottom-row { display:flex; gap:10px; width:100%; }
  .input-bottom-row .nature-btn { flex:1; font-size:14px; padding:14px 0; }

  .back-btn-sm {
    font-size:14px !important; padding:14px 0 !important;
    background:linear-gradient(180deg, #D7CCC8, #BCAAA4) !important;
    color:#4E342E !important;
  }

  /* ============================================ */
  /*  自然展示台 — 替代老虎机                       */
  /* ============================================ */

  .slot-title-bar {
    font-family:'Noto Serif SC',serif; font-size:16px; font-weight:600;
    color:#2E7D32; text-align:center; letter-spacing:2px;
  }

  /* ---- 花冠 ---- */
  .floral-crown {
    display:flex; justify-content:center; align-items:flex-end;
    gap:2px; height:48px; margin-bottom:-8px; position:relative; z-index:2;
  }
  .crown-flower {
    width:22px; height:28px; background:#F8BBD0;
    border-radius:50% 50% 35% 35%; position:relative;
  }
  .crown-flower::before {
    content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%);
    width:18px; height:12px; background:#F48FB1; border-radius:50%;
  }
  .crown-flower::after {
    content:''; position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
    width:2px; height:16px; background:#8BC34A; border-radius:1px;
  }
  .crown-flower.center {
    width:32px; height:38px; background:#FFD54F;
  }
  .crown-flower.center::before {
    width:24px; height:16px; background:#FFEC6E;
  }

  /* ---- 展示头部 ---- */
  .display-header {
    width:84%; margin:0 auto;
    background:linear-gradient(180deg, #8D6E63, #6D4C41);
    border-radius:16px 16px 0 0; padding:14px 10px 10px;
    text-align:center; border:3px solid #5D4037; border-bottom:none;
    position:relative; z-index:1;
  }
  .display-header-inner {
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .header-vine {
    width:24px; height:3px; background:#8BC34A; border-radius:2px;
    position:relative;
  }
  .header-vine::before {
    content:''; position:absolute; top:-6px; left:8px;
    width:8px; height:8px; background:#9CCC65; border-radius:50%;
  }
  .header-vine::after {
    content:''; position:absolute; top:-4px; right:4px;
    width:6px; height:6px; background:#AED581; border-radius:50%;
  }

  /* ---- 花苞灯 ---- */
  .slot-lights { display:flex; justify-content:center; gap:7px; margin-top:6px; }
  .slot-light {
    width:13px; height:13px;
    background:#5D4037; border-radius:50%;
    transition:background .3s, box-shadow .3s, transform .3s;
    position:relative;
  }
  .slot-light.lit {
    background:#FFD54F;
    box-shadow:0 0 14px #FFD54F, 0 0 28px rgba(255,213,79,0.45);
    transform:scale(1.35);
  }
  .slot-lights.chasing .slot-light {
    animation:budPulse .64s steps(1) infinite;
  }
  .slot-lights.chasing .slot-light:nth-child(1){animation-delay:0s}
  .slot-lights.chasing .slot-light:nth-child(2){animation-delay:.08s}
  .slot-lights.chasing .slot-light:nth-child(3){animation-delay:.16s}
  .slot-lights.chasing .slot-light:nth-child(4){animation-delay:.24s}
  .slot-lights.chasing .slot-light:nth-child(5){animation-delay:.32s}
  .slot-lights.chasing .slot-light:nth-child(6){animation-delay:.40s}
  .slot-lights.chasing .slot-light:nth-child(7){animation-delay:.48s}

  @keyframes budPulse {
    0%,14%  { background:#FFD54F; box-shadow:0 0 16px #FFD54F,0 0 30px rgba(255,213,79,0.5); transform:scale(1.4); }
    15%,100%{ background:#5D4037; box-shadow:none; transform:scale(1); }
  }

  /* ---- 展示机身 ---- */
  .display-body {
    width:80%; margin:0 auto;
    background:linear-gradient(180deg, #8D6E63, #795548);
    border-left:4px solid #5D4037; border-right:4px solid #5D4037;
    padding:12px 10px 8px; position:relative;
  }
  .display-body::before {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.04) 10px, rgba(0,0,0,0.04) 12px);
    pointer-events:none;
  }

  /* ---- 屏幕框 ---- */
  .display-bezel {
    padding:6px;
    background:linear-gradient(180deg, #6D4C41, #5D4037);
    border-radius:12px; border:2px solid #4E342E;
    box-shadow:inset 0 3px 10px rgba(0,0,0,0.3);
  }
  .display-screen {
    background:linear-gradient(180deg, #FFFEF7, #F5F0E4);
    border-radius:8px; border:2px solid #5D4037;
    padding:10px 8px 6px;
    box-shadow:inset 0 0 24px rgba(139,195,74,0.12);
  }

  /* ---- 滚轴 ---- */
  .reels-wrapper { display:flex; justify-content:center; gap:8px; padding:4px 0; position:relative; z-index:1; }

  .reel-frame {
    position:relative; width:66px; height:50px;
    background:#3E2723;
    border:3px solid #6D4C41; border-radius:8px;
    overflow:hidden;
    box-shadow:
      inset 0 0 12px rgba(0,0,0,0.35),
      0 3px 8px rgba(0,0,0,0.15);
  }
  .reel-frame::before {
    content:''; position:absolute; top:0;left:0;right:0; height:42%;
    background:linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
    z-index:3; pointer-events:none;
  }
  .reel-frame::after {
    content:''; position:absolute; left:0;right:0; top:50%;
    height:2px; background:rgba(255,213,79,0.7);
    box-shadow:0 0 8px rgba(255,213,79,0.4);
    z-index:3; pointer-events:none;
  }

  .reel-strip { position:absolute; left:0; width:100%; will-change:transform; }
  .reel-num {
    display:flex; align-items:center; justify-content:center;
    height:46px;
    font-family:'Quicksand',sans-serif; font-size:30px; font-weight:700;
    color:#FFFEF7;
    text-shadow:0 0 8px rgba(255,255,255,0.3);
  }

  /* ---- 屏幕底部 ---- */
  .display-label {
    text-align:center; font-family:'Noto Serif SC',serif;
    font-size:9px; color:#FFFEF7; letter-spacing:5px;
    padding:5px 0 2px; opacity:.65;
  }

  /* ---- 装饰搁板 ---- */
  .display-shelf {
    width:88%; margin:0 auto;
    background:linear-gradient(180deg, #A1887F, #8D6E63);
    border:3px solid #5D4037; border-top:3px solid #6D4C41;
    border-radius:0 0 10px 10px; padding:10px 14px;
    box-shadow:0 3px 0 #5D4037;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .shelf-moss {
    flex:1; height:6px; background:#8BC34A; border-radius:3px; opacity:.7;
  }
  .shelf-flower {
    width:14px; height:14px; background:#FFD54F;
    border-radius:50%; flex-shrink:0;
    box-shadow:0 0 10px rgba(255,213,79,0.45);
  }
  .shelf-flower.sm { width:10px; height:10px; background:#F8BBD0; box-shadow:0 0 8px rgba(248,187,208,0.4); }

  /* ---- 底座 ---- */
  .display-base {
    width:80%; margin:0 auto;
    background:linear-gradient(180deg, #6D4C41, #5D4037);
    border-left:3px solid #4E342E; border-right:3px solid #4E342E;
    border-bottom:3px solid #4E342E; padding:6px 8px 10px;
  }
  .wood-grain {
    height:3px; margin:4px 0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    border-radius:1px;
  }

  /* ---- 底座脚 ---- */
  .display-foot {
    width:88%; height:12px; margin:0 auto -4px;
    background:linear-gradient(180deg, #5D4037, #4E342E);
    border-radius:0 0 10px 10px; border:2px solid #4E342E;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
  }

  /* ---- 滚轴旋转闪烁 ---- */
  .reel-frame.spinning {
    animation:reelNatureGlow .35s ease-in-out infinite;
  }
  @keyframes reelNatureGlow {
    0%,100%{
      border-color:#6D4C41;
      box-shadow:inset 0 0 12px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.15);
    }
    50%{
      border-color:#FFD54F;
      box-shadow:
        inset 0 0 22px rgba(255,213,79,0.3),
        0 0 18px rgba(255,213,79,0.45),
        0 3px 8px rgba(0,0,0,0.15);
    }
  }

  /* ---- 着陆闪光 ---- */
  .reel-frame.landed {

    0%{
      border-color:#FFD54F;
      box-shadow:
        inset 0 0 32px rgba(255,213,79,0.5),
        0 0 28px rgba(255,213,79,0.55);

    100%{
      border-color:#6D4C41;

      transform:scale(1);

  /* ---- 花瓣爆发 ---- */

    position:fixed; pointer-events:none; z-index:100;

  @keyframes petalBurst {
    0%   { transform:translate(0,0) rotate(0deg) scale(.6); opacity:1; }

    background:linear-gradient(180deg, #66BB6A, #4CAF50) !important;

  /* ============================================ */
  /*  小皇帝和情绪 — 滑动面板                      */
  /* ============================================ */

  .emotion-list {
    width:100%; display:flex; flex-direction:column; gap:10px;

  }

    display:flex; flex-direction:column; gap:8px;

    animation:budBeat .35s ease-in-out infinite;
  }
  @keyframes budBeat {
    0%,100%{transform:scale(1);box-shadow:0 0 8px var(--emo-glow);}
    50%{transform:scale(1.5);box-shadow:0 0 18px var(--emo-glow),0 0 28px var(--emo-glow);}

  .emotion-label {

  /* ===== 自然风滑块 ===== */

    -webkit-appearance:none; appearance:none;

  .emotion-slider::-webkit-slider-runnable-track {
    width:100%; height:8px;

<script>
  // ===== 生成自然场景 =====
  (function() {
    const scene = document.getElementById('nature-scene');
    let html = '';

    // 白云 — 4朵
    for (let i = 0; i < 4; i++) {
      const top = 5 + Math.random() * 28;
      const dur = 22 + Math.random() * 26;
      const delay = Math.random() * 20;
      const w = 50 + Math.random() * 45;
      html += `<div class="cloud" style="top:${top}%;left:-120px;--cdur:${dur}s;animation-delay:${delay}s;width:${w}px;"></div>`;
    }

    // 远山 — 3层
    html += `<div class="hill hill-back"></div>`;
    html += `<div class="hill hill-mid"></div>`;
    html += `<div class="hill hill-front"></div>`;

    // 树木 — 2棵
    const treePositions = [
      { style:'left:3%;right:auto;bottom:16vh', dur:4.5, delay:0 },
      { style:'left:auto;right:2%;bottom:15vh', dur:5.5, delay:1.2 }
    ];
    treePositions.forEach((pos, i) => {
      html += `<div class="tree" style="${pos.style};--tsway:${pos.dur}s;--tdelay:${pos.delay}s;">
        <div class="tree-canopy"></div>
        <div class="tree-trunk"></div>
      </div>`;
    });

    // 草叶 — 40根
    for (let i = 0; i < 40; i++) {
      const x = Math.random() * 100;
      const h = 20 + Math.random() * 50;
      const dur = 2.5 + Math.random() * 4;
      const delay = Math.random() * 3;
      const greens = ['#9CCC65','#8BC34A','#7CB342','#AED581','#689F38'];
      const gc = greens[Math.floor(Math.random() * greens.length)];
      html += `<div class="grass-blade" style="left:${x}%;--gh:${h}px;--gc:${gc};--sdur:${dur}s;--sdelay:${delay}s;"></div>`;
    }

    // 落叶 — 28片
    for (let i = 0; i < 28; i++) {
      const x = Math.random() * 96;
      const dur = 7 + Math.random() * 11;
      const delay = Math.random() * 13;
      const drift = -50 + Math.random() * 100;
      const rot = Math.random() * 360;
      const leafColors = ['#7CB342','#8BC34A','#9CCC65','#689F38','#F8BBD0','#F48FB1','#FFD54F'];
      const lc = leafColors[Math.floor(Math.random() * leafColors.length)];
      html += `<div class="falling-leaf" style="left:${x}%;--lc:${lc};--fdur:${dur}s;--fdelay:${delay}s;--ldrift:${drift}px;--lrot:${rot}deg;"></div>`;
    }

    // 花瓣 — 12片
    for (let i = 0; i < 12; i++) {
      const x = Math.random() * 94;
      const dur = 11 + Math.random() * 14;
      const delay = Math.random() * 16;
      const drift = 30 + Math.random() * 90;
      const rot = Math.random() * 60;
      const petalColors = ['#F8BBD0','#F48FB1','#FFD54F','#FFF9C4'];
      const pc = petalColors[Math.floor(Math.random() * petalColors.length)];
      html += `<div class="floating-petal" style="left:${x}%;--pc:${pc};--pdur:${dur}s;--pdelay:${delay}s;--pdrift:${drift}px;--prot:${rot}deg;"></div>`;
    }

    // 草地小花 — 15朵
    const flowerColors = ['#FFF','#FFF9C4','#F8BBD0','#FFD54F','#FCE4EC'];
    for (let i = 0; i < 15; i++) {
      const x = 2 + Math.random() * 96;
      const fy = 3 + Math.random() * 14;
      const fdur = 3 + Math.random() * 4;
      const fdelay = Math.random() * 5;
      const fc = flowerColors[Math.floor(Math.random() * flowerColors.length)];
      html += `<div class="meadow-flower" style="left:${x}%;--mfy:${fy}px;--mfc:${fc};--mfdur:${fdur}s;--mfdelay:${fdelay}s;"></div>`;
    }

    scene.innerHTML = html;
  })();

  // ===== 页面导航 =====
  const pageHome  = document.getElementById('page-home');
  const pageInput = document.getElementById('page-input');
  const pageSlot  = document.getElementById('page-slot');
  const pageEmotion = document.getElementById('page-emotion');
  let currentScore = 0;

  function hideAll() {
    pageHome.classList.add('hidden');
    pageInput.classList.add('hidden');
    pageSlot.classList.add('hidden');
    pageEmotion.classList.add('hidden');
  }

  function goHome()  { hideAll(); pageHome.classList.remove('hidden'); }
  function goInput() { hideAll(); pageInput.classList.remove('hidden'); resetInput(); }
  function goSlot(sc) { hideAll(); pageSlot.classList.remove('hidden'); startSlotShow(sc); }
  function goEmotion() { hideAll(); pageEmotion.classList.remove('hidden'); }

  // ===== 波纹 =====
  function createRipple(e) {
    const t = e.currentTarget.getBoundingClientRect();
    const cx = e.clientX || (t.left + t.width/2);
    const cy = e.clientY || (t.top + t.height/2);
    const r = document.createElement('div'); r.className='ripple';
    r.style.left=(cx-10)+'px'; r.style.top=(cy-10)+'px';
    document.body.appendChild(r);
    r.addEventListener('animationend',()=>r.remove());
  }

  function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

  // ===== 主页按钮 =====
  document.querySelectorAll('#page-home .nature-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const id = this.dataset.id;
      createRipple(e); vibrate(30);
      if (id === 'emperor') goInput();
      else if (id === 'B') goEmotion();
      else console.log(`[宝盒] 按钮 ${id} 被点击`);
    });
  });

  // ===== 输入分数页面逻辑 =====
  const inputDisplay = document.getElementById('input-display');
  let inputBuf = '0';

  function resetInput() {
    inputBuf = '0';
    inputDisplay.textContent = '0';
  }

  document.querySelectorAll('#page-input .numpad-key').forEach(key => {
    key.addEventListener('click', function(e) {
      const k = this.dataset.k;
      vibrate(8);
      if (k === 'del') {
        inputBuf = inputBuf.length > 1 ? inputBuf.slice(0, -1) : '0';
      } else if (k === 'go') {
        const val = parseInt(inputBuf, 10) || 0;
        currentScore = Math.min(999, Math.max(0, val));
        vibrate(20);
        goSlot(currentScore);
        return;
      } else {
        if (inputBuf === '0') inputBuf = k;
        else if (inputBuf.length < 3) inputBuf += k;
      }
      const num = parseInt(inputBuf, 10) || 0;
      inputBuf = String(Math.min(999, num));
      inputDisplay.textContent = inputBuf;
    });
  });

  document.getElementById('btn-input-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20); goHome();
  });

  // ===== 老虎机展示逻辑 =====
  const ITEM_HEIGHT = 46;
  const ITEMS_PER_CYCLE = 10;
  const STRIP_REPEATS = 10;
  const TOTAL_ITEMS = ITEMS_PER_CYCLE * STRIP_REPEATS;
  const SPIN_SPEED_BASE = 2.5;
  const SPIN_DURATION = 2000;
  const REEL_STOP_GAP = 400;

  const reelFrames = [0,1,2].map(i => document.getElementById(`reel-frame-${i}`));
  const reelStrips = [0,1,2].map(i => document.getElementById(`reel-strip-${i}`));
  const slotLightsBar = document.getElementById('slot-lights-bar');
  const slotLights = [...document.querySelectorAll('.slot-light')];

  let isSpinning = false;
  let animFrameId = null;

  const reels = [0,1,2].map(() => ({
    position: 0, spinning: false, finalTarget: 0,
    speed: 0, _decelStarted: false, _decelFrom: 0, _decelTarget: 0,
    _decelDist: 0, _decelStartTime: 0, _decelDuration: 650
  }));

  function buildReelStrips() {
    reelStrips.forEach(strip => {
      let html = '';
      for (let r = 0; r < STRIP_REPEATS; r++)
        for (let n = 0; n < 10; n++)
          html += `<div class="reel-num">${n}</div>`;
      strip.innerHTML = html;
      strip.style.transform = 'translateY(0px)';
      strip.style.transition = 'none';
    });
  }

  function resetReels() {
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; animFrameId = null; }
    reels.forEach(r => {
      r.position = 0; r.spinning = false; r.finalTarget = 0; r.speed = 0;
      r._decelStarted = false;
    });
    reelStrips.forEach(s => { s.style.transition = 'none'; s.style.transform = 'translateY(0px)'; });
    reelFrames.forEach(f => { f.classList.remove('spinning', 'landed'); });
    slotLightsBar.classList.remove('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
  }

  function startSlotShow(score) {
    resetReels();
    setTimeout(() => { runSpin(score); }, 400);
  }

  function runSpin(score) {
    isSpinning = true;
    slotLightsBar.classList.add('chasing');
    slotLights.forEach(l => l.classList.remove('lit'));
    const digits = String(score).padStart(3, '0').split('').map(Number);

    reels.forEach((reel, i) => {
      reel.spinning = true;
      reel.finalTarget = digits[i];
      reel.speed = SPIN_SPEED_BASE + Math.random() * 0.8;
      reel._decelStarted = false;
      reelFrames[i].classList.add('spinning');
      reelFrames[i].classList.remove('landed');
      reelStrips[i].style.transition = 'none';
    });

    const startTime = performance.now();

    function animate(now) {
      const elapsed = now - startTime;

      reels.forEach((reel, i) => {
        if (!reel.spinning) return;

        const stopTime = SPIN_DURATION + i * REEL_STOP_GAP;

        if (elapsed < stopTime) {
          const rampUp = Math.min(1, elapsed / 600);
          reel.position += reel.speed * (0.6 + 0.4 * rampUp);
          const dp = ((Math.floor(reel.position) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;
        } else if (!reel._decelStarted) {
          reel._decelStarted = true;
          reel._decelFrom = reel.position;
          reel._decelStartTime = now;

          const cur = ((Math.floor(reel.position) % ITEMS_PER_CYCLE) + ITEMS_PER_CYCLE) % ITEMS_PER_CYCLE;
          let adv = reel.finalTarget - cur;
          if (adv <= 0) adv += ITEMS_PER_CYCLE;
          adv += (2 + i) * ITEMS_PER_CYCLE;

          reel._decelTarget = Math.floor(reel.position) + adv;
          reel._decelDist = reel._decelTarget - reel.position;
          reel._decelDuration = 550 + i * 120;
        } else {
          const dt = now - reel._decelStartTime;
          const t = Math.min(1, dt / reel._decelDuration);
          const eased = 1 - Math.pow(1 - t, 4);
          const pos = reel._decelFrom + reel._decelDist * eased;
          const dp = ((Math.floor(pos) % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
          reelStrips[i].style.transform = `translateY(-${dp * ITEM_HEIGHT}px)`;

          if (t >= 1) {
            const fdp = ((reel._decelTarget % TOTAL_ITEMS) + TOTAL_ITEMS) % TOTAL_ITEMS;
            reelStrips[i].style.transform = `translateY(-${fdp * ITEM_HEIGHT}px)`;
            reel.spinning = false;
            reel.position = reel._decelTarget;

            reelFrames[i].classList.remove('spinning');
            reelFrames[i].classList.add('landed');
            vibrate(12);
            spawnPetalBurst(reelFrames[i]);
            setTimeout(() => reelFrames[i].classList.remove('landed'), 500);
          }
        }
      });

      if (reels.some(r => r.spinning)) {
        animFrameId = requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
        slotLightsBar.classList.remove('chasing');
        settleLights(score);
        setTimeout(() => vibrate([15, 30, 15]), 200);
      }
    }

    animFrameId = requestAnimationFrame(animate);
  }

  // 花瓣爆发
  function spawnPetalBurst(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ['#F8BBD0','#F48FB1','#FFD54F','#FFF9C4','#DCEDC8','#FFAB91'];
    for (let i = 0; i < 14; i++) {
      const angle = (Math.PI * 2 * i) / 14 + Math.random() * 0.3;
      const dist = 22 + Math.random() * 35;
      const bx = Math.cos(angle) * dist;
      const by = Math.sin(angle) * dist;
      const particle = document.createElement('div');
      particle.className = 'petal-burst';
      particle.style.left = (cx - 5) + 'px';
      particle.style.top = (cy - 5) + 'px';
      particle.style.setProperty('--bx', bx + 'px');
      particle.style.setProperty('--by', by + 'px');
      particle.style.setProperty('--br', (Math.random() * 360) + 'deg');
      particle.style.setProperty('--pbdur', (0.5 + Math.random() * 0.5) + 's');
      particle.style.setProperty('--pbc', colors[Math.floor(Math.random() * colors.length)]);
      document.body.appendChild(particle);
      particle.addEventListener('animationend', () => particle.remove());
    }
  }

  // 按分数比例点灯 (0~999 → 0~7盏)
  function settleLights(score) {
    const totalLights = slotLights.length;
    const ratio = Math.min(1, Math.max(0, score / 999));
    const litCount = Math.round(ratio * totalLights);
    slotLights.forEach((light, i) => {
      if (i < litCount) light.classList.add('lit');
      else light.classList.remove('lit');
    });
  }

  // ===== 老虎机页面按钮 =====
  document.getElementById('btn-slot-back').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goHome();
  });

  document.getElementById('btn-retry').addEventListener('click', function(e) {
    createRipple(e); vibrate(20);
    if (isSpinning) { cancelAnimationFrame(animFrameId); isSpinning = false; }
    goInput();
  });

  // ===== 初始化 =====
  buildReelStrips();

  // ===========================================================
  //  小皇帝和情绪 — 滑动交互
  // ===========================================================

  const emotionColors = {
    happy:'#FFD54F', excited:'#FFAB91', angry:'#EF5350',
    hesitant:'#BCAAA4', sad:'#81D4FA', worried:'#B39DDB', love:'#F8BBD0'
  };

  function spawnEmoParticles(el, color) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI*2*i)/8 + Math.random()*0.3;
      const dist = 14 + Math.random()*22;
      const p = document.createElement('div');
      p.className = 'emo-particle';
      p.style.left = (cx-4)+'px'; p.style.top = (cy-4)+'px';
      p.style.setProperty('--bx', Math.cos(angle)*dist+'px');
      p.style.setProperty('--by', Math.sin(angle)*dist+'px');
      p.style.setProperty('--ep', color);
      p.style.animationDuration = (0.35+Math.random()*0.3)+'s';
      document.body.appendChild(p);
      p.addEventListener('animationend',()=>p.remove());
    }
  }

  document.querySelectorAll('.emotion-slider').forEach(slider=>{
    const item = slider.closest('.emotion-item');
    const key = item.dataset.emotion;
    const color = emotionColors[key];
    const valSpan = document.getElementById('val-'+key);
    const bud = item.querySelector('.emotion-bud');
    let dragging = false;

    slider.addEventListener('input', ()=>{
      const v = parseInt(slider.value,10);
      slider.style.setProperty('--fill-pct', v+'%');
      valSpan.textContent = v;
      valSpan.style.color = v>70 ? color : '#8D6E63';
      const glow = Math.round(v*0.25);
      item.querySelector('.emotion-label').style.textShadow =
        '0 0 '+glow+'px '+color;
      if (dragging && v%4===0) spawnEmoParticles(slider, color);
    });

    function start(){ dragging=true; item.classList.add('active'); bud.classList.add('pulse'); spawnEmoParticles(slider,color); }
    function end(){ dragging=false; item.classList.remove('active'); bud.classList.remove('pulse'); setTimeout(()=>spawnEmoParticles(slider,color),80); }

    slider.addEventListener('mousedown', start);
    slider.addEventListener('touchstart', start, {passive:true});
    slider.addEventListener('mouseup', end);
    slider.addEventListener('touchend', end);
    slider.addEventListener('touchcancel', end);
    slider.addEventListener('mouseleave', ()=>{ if(dragging) end(); });
  });

  document.getElementById('btn-emotion-back').addEventListener('click', function(e){
    createRipple(e); vibrate(20); goHome();
  });
</script>

</body>
</html>
